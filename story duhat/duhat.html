<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duhat Interactive Quiz - High Contrast Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @font-face {
            font-family: 'Alfabeto';
            src: url('Alfabeto.ttf') format('truetype');
        }
        :root {
            --primary-font: 'Alfabeto', 'Fredoka', 'Comic Sans MS', cursive, sans-serif;
            --blue-accent: #0077b6;
            --leaf-green: #2d6a4f;
            --text-black: #000000; /* Strict Black */
        }

        body, html {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            font-family: var(--primary-font);
            background: var(--leaf-green); transition: background 0.4s ease-in-out;
            user-select: none;
            color: var(--text-black);
        }

        .wrong-flash { background: #ff4757 !important; transition: 0.2s; }

        #transition-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; display: flex;
            justify-content: center; align-items: center; overflow: hidden;
        }

        .trans-leaf {
            position: absolute; background: var(--blue-accent);
            border-radius: 0 50% 0 50%; transform: scale(0);
        }

        @keyframes leafFill {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
            100% { transform: scale(2) rotate(360deg); opacity: 0; }
        }

        .garden-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #caf0f8 0%, #ade8f4 50%, #e0f2fe 100%);
            z-index: 1;
        }

        .floating-duhat-container { position: absolute; width: 100%; height: 100%; z-index: 2; overflow: hidden; }
        
        .duhat-wrapper {
            position: absolute; width: 80px; z-index: 3;
            animation: fall-rotate linear infinite;
        }

        .bg-duhat { width: 100%; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2)); }

        @keyframes fall-rotate {
            0% { top: -100px; transform: rotate(0deg); }
            100% { top: 110vh; transform: rotate(360deg); }
        }

        .ground {
            position: absolute; bottom: 0; width: 100%; height: 80px;
            background: #52796f; border-top: 8px solid #354f52; z-index: 5;
        }

        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.98); 
            border: 12px solid var(--blue-accent);
            border-radius: 50px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            max-width: 1100px; width: 95%; text-align: center; position: relative;
        }

        .zoom-out-wow { transform: scale(0) rotate(10deg); opacity: 0; transition: 0.6s; }
        .bounce-in-wow { animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; }
        
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .white-bg-active { background: #ffffff !important; }
        .hide-garden { opacity: 0 !important; pointer-events: none; }

        /* ALL TEXT FORCED TO BLACK */
        h1, h2, div, span, p { color: var(--text-black) !important; }
        
        .story-box {
            flex: 1; font-size: 1.8rem; line-height: 1.4; background: #ffffff;
            border-radius: 30px; border: 5px dashed var(--blue-accent); padding: 30px;
        }

        .story-container { display: flex; align-items: center; justify-content: center; gap: 30px; margin-top: 20px; }
        .story-image-box { flex: 0.8; max-width: 400px; }
        .story-image-box img { width: 100%; height: auto; border-radius: 20px; }

        .deped-logo { position: absolute; top: -75px; left: 40px; width: 140px; }
        
        #timer-display {
            position: fixed; top: 20px; right: 20px; background: #d62828; color: white !important;
            padding: 10px 25px; border-radius: 50px; font-size: 2rem; font-weight: 700;
            border: 4px solid white; z-index: 100;
        }

        .btn-custom {
            font-size: 2.5rem; padding: 15px 50px; border-radius: 100px; border: none;
            font-weight: 700; color: white !important; box-shadow: 0 10px 0 #005f8d; cursor: pointer;
            font-family: var(--primary-font); text-transform: uppercase;
        }
        .btn-ready { background-color: var(--blue-accent); }
        .btn-ready:active { transform: translateY(8px); box-shadow: 0 2px 0 #005f8d; }

        .btn-audio {
            background: #ffb703; color: white !important; border: none; border-radius: 50%;
            width: 70px; height: 70px; font-size: 2rem; box-shadow: 0 6px 0 #fb8500;
        }

        .btn-choice { 
            background-color: white; border: 4px solid var(--blue-accent); 
            width: 100%; margin-bottom: 12px; text-align: left; padding: 12px 30px;
            font-size: 2rem; border-radius: 30px; box-shadow: 0 8px 0 var(--blue-accent);
            transition: all 0.2s; font-family: var(--primary-font);
        }
        
        .btn-choice:hover:not(:disabled) { background-color: #f0f9ff; transform: translateX(10px); }
        
        /* Ensures the text inside button stays black even on hover */
        .btn-choice span, .btn-choice { color: var(--text-black) !important; }

        #message { font-size: 2.5rem; margin-top: 5px; min-height: 3rem; font-weight: 700; }
        .hidden { display: none !important; }

        .score-text { font-size: 4rem; font-weight: 700; margin-top: 10px; }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div id="transition-overlay"></div>

    <div class="garden-container" id="garden-bg">
        <div class="floating-duhat-container" id="duhat-box"></div>
        <div class="ground"></div>
    </div>

    <div id="timer-display" class="hidden">05:00</div>

    <div class="ui-wrapper">
        <div class="main-card" id="card-container">
            <img src="deped.png" class="deped-logo" alt="DepEd Logo">
            
            <div id="content-welcome">
                <h1 class="mb-5">Handa Ka Na Ba sa Duhat?</h1>
                <button class="btn-custom btn-ready" onclick="triggerWowForStory()">MAGSIMULA</button>
            </div>

            <div id="content-story" class="hidden">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h1>Ang Duhat</h1>
                    <button class="btn-audio" onclick="playVoice()">🔊</button>
                </div>
                
                <div class="story-container">
                    <div class="story-box text-start">
                        Tuwing <b>tag-araw</b>, maraming Duhat.<br>
                        Kulay <b>lila</b> ang mga bunga nito.<br>
                        Pagkahugas ay nilalagyan namin ito ng <b>asin</b>.<br>
                        Kinakalog sa mangkok para <b>lumambot</b> ang mga Duhat.<br>
                        <b>Masustansiya</b> ang Duhat.
                    </div>
                    <div class="story-image-box">
                        <img src="duhat.png" alt="Duhat Fruit" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1210/1210815.png'">
                    </div>
                </div>

                <button class="btn-custom btn-ready mt-5" onclick="triggerLeafTransition()">MAGPATULOY</button>
            </div>

            <div id="content-quiz" class="hidden">
                <div class="mb-3">
                    <h2 id="question-text" style="font-size: 2.5rem; font-weight: 700;"></h2>
                </div>
                <div id="choices-container"></div>
                <div id="message" class="fw-bold"></div>
            </div>
        </div>
    </div>

    <audio id="storyVoice" src="duhatvoice.m4a"></audio>
    <audio id="ding" src="https://www.myinstants.com/media/sounds/ding-sound-effect_1.mp3"></audio>
    <audio id="buzzer" src="https://www.myinstants.com/media/sounds/spongebob-fail.mp3"></audio>

    <script>
        const duhatBox = document.getElementById('duhat-box');
        for (let i = 0; i < 12; i++) {
            const dWrap = document.createElement('div');
            dWrap.className = 'duhat-wrapper';
            dWrap.style.left = Math.random() * 90 + '%';
            dWrap.style.animationDuration = (Math.random() * 5 + 7) + 's';
            dWrap.style.animationDelay = -(Math.random() * 10) + 's';
            dWrap.innerHTML = `<img src="duhat1.png" class="bg-duhat" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1210/1210815.png'">`;
            duhatBox.appendChild(dWrap);
        }

        const questions = [
            { q: "Kailan namumunga ang puno ng Duhat?", opt: ["Tag-araw", "Tag-bagyo", "Tag-ulan", "Tagtuyot"], ans: 0 },
            { q: "Ano ang kulay ng Duhat?", opt: ["Dilaw", "Kahel", "Lila", "Pula"], ans: 2 },
            { q: "Ano ang inilalagay nila sa Duhat?", opt: ["Asin", "Bawang", "Luya", "Sibuyas"], ans: 0 },
            { q: "Paano lalambot ang mga Duhat?", opt: ["Ibibilad", "Ilalaga", "Kakalugin", "Kakatasin"], ans: 2 },
            { q: "Ano ang mahalagang katangian ng Duhat?", opt: ["Masarap", "Masustansiya", "Mailap", "Wala"], ans: 1 }
        ];

        let currentQ = 0;
        let score = 0;
        let timeLeft = 300;
        let timerStarted = false;
        let retakeCount = 0;
        let timerInterval;

        function triggerLeafTransition() {
            const overlay = document.getElementById('transition-overlay');
            document.getElementById('ding').play();
            for (let i = 0; i < 15; i++) {
                const l = document.createElement('div');
                l.className = 'trans-leaf';
                const size = Math.random() * 300 + 200;
                l.style.width = size + 'px'; l.style.height = (size/1.5) + 'px';
                l.style.left = Math.random() * 100 + '%';
                l.style.top = Math.random() * 100 + '%';
                l.style.animation = `leafFill 1.2s ease-in-out forwards`;
                overlay.appendChild(l);
            }
            setTimeout(() => { startQuiz(); }, 700);
            setTimeout(() => { overlay.innerHTML = ''; }, 2000);
        }

        function triggerWowForStory() {
            document.getElementById('ding').play();
            const card = document.getElementById('card-container');
            card.classList.add('zoom-out-wow');
            document.getElementById('garden-bg').classList.add('hide-garden');
            document.body.classList.add('white-bg-active');
            setTimeout(() => {
                document.getElementById('content-welcome').classList.add('hidden');
                document.getElementById('content-story').classList.remove('hidden');
                card.classList.remove('zoom-out-wow');
                card.classList.add('bounce-in-wow');
            }, 700);
        }

        function startQuiz() {
            document.getElementById('content-story').classList.add('hidden');
            document.getElementById('content-quiz').classList.remove('hidden');
            document.getElementById('timer-display').classList.remove('hidden');
            if(!timerStarted) { startTimer(); timerStarted = true; }
            loadQuestion();
        }

        function resetQuiz() {
            retakeCount++;
            currentQ = 0;
            score = 0;
            pointsDrawn = 0;
            
            // Restore Quiz HTML Structure
            document.getElementById('content-quiz').innerHTML = `
                <div class="mb-3"><h2 id="question-text" style="font-size: 2.5rem; font-weight: 700;"></h2></div>
                <div id="choices-container"></div><div id="message" class="fw-bold"></div>
            `;
            canvasInitialized = false;
            timeLeft = 300;
            clearInterval(timerInterval);
            timerStarted = false;

            document.getElementById('content-quiz').classList.add('hidden');
            document.getElementById('content-welcome').classList.remove('hidden');
            document.getElementById('card-container').classList.remove('zoom-out-wow', 'bounce-in-wow');
            document.getElementById('garden-bg').classList.remove('hide-garden');
            document.body.classList.remove('white-bg-active');
            document.getElementById('timer-display').classList.add('hidden');
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    let mins = Math.floor(timeLeft / 60);
                    let secs = timeLeft % 60;
                    document.getElementById('timer-display').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                } else {
                    clearInterval(timerInterval);
                    finish();
                }
            }, 1000);
        }

        function loadQuestion() {
            const data = questions[currentQ];
            document.getElementById('question-text').innerHTML = `<span>${currentQ + 1}.</span> ${data.q}`;
            const container = document.getElementById('choices-container');
            container.innerHTML = "";
            document.getElementById('message').innerText = "";
            
            data.opt.forEach((val, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-choice";
                const letter = String.fromCharCode(65 + idx);
                btn.innerHTML = `<span class="choice-marker">${letter}.</span> ${val}`;
                
                btn.onclick = () => {
                    if(idx === data.ans) {
                        score++;
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#0077b6', '#000000'] });
                        document.getElementById('ding').play();
                        document.getElementById('message').innerHTML = "<span style='color:#2ecc71 !important'>TAMA</span>";
                    } else {
                        document.body.classList.add('wrong-flash');
                        setTimeout(() => document.body.classList.remove('wrong-flash'), 400);
                        document.getElementById('buzzer').currentTime = 0;
                        document.getElementById('buzzer').play();
                        btn.classList.add('shake');
                        document.getElementById('message').innerHTML = "<span style='color:#e74c3c !important'>MALI</span>";
                    }
                    const allBtns = container.querySelectorAll('.btn-choice');
                    allBtns.forEach(b => b.disabled = true);
                    setTimeout(() => {
                        currentQ++;
                        if(currentQ < questions.length) loadQuestion();
                        else finish();
                    }, 1500);
                };
                container.appendChild(btn);
            });
        }

        function playVoice() {
            const v = document.getElementById('storyVoice');
            v.currentTime = 0; v.play();
        }

        function finish() {
            const quizNode = document.getElementById('content-quiz');
            const isPerfect = (score === questions.length);
            if(isPerfect) {
                localStorage.setItem('story_completed_duhat', 'true');
            }

            // SAVE TO LEADERBOARD
            const currentUser = localStorage.getItem('currentUser');
            if(currentUser) {
                let leaderboard = JSON.parse(localStorage.getItem('leaderboard')) || {};
                if(!leaderboard[currentUser]) leaderboard[currentUser] = {};
                
                const currentData = leaderboard[currentUser]['duhat'] || { score: 0, retakes: 0 };
                let newScore = isPerfect ? score : currentData.score;
                
                leaderboard[currentUser]['duhat'] = { score: newScore, retakes: retakeCount };
                localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
            }

            quizNode.innerHTML = `
                <h1 class="mb-4">${isPerfect ? 'NAPAKAHUSAY' : 'KAYA MO YAN'}</h1>
                <div class="score-text mb-4">SCORE: ${score}/${questions.length}</div>
                <div style="font-size: 2rem; color: #004a8e;" class="mb-4">Bilang ng Ulit: ${retakeCount}</div>
                ${isPerfect 
                    ? `<button class="btn-custom btn-ready mt-4" onclick="window.location.href='../story espesyal ensaymada/espesyal ensaymada.html'">SUSUNOD NA ARALIN ➡️</button>` 
                    : `<button class="btn-custom btn-ready mt-4" onclick="resetQuiz()">ULITIN</button>`
                }
                <button class="btn-custom btn-ready mt-3" style="background-color: #e74c3c; box-shadow: 0 8px 0 #c0392b;" onclick="window.location.href='../Main.html'">HOME 🏠</button>
            `;
            document.getElementById('timer-display').classList.add('hidden');
        }
    </script>
</body>
</html>
