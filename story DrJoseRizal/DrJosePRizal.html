<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Jose P. Rizal - Interactive Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @font-face {
            font-family: 'Alfabeto';
            src: url('Alfabeto.ttf') format('truetype');
        }
        :root {
            --primary-font: 'Alfabeto', sans-serif;
            --main-color: #0d47a1;
            --accent-color: #ff9800;
        }

        * {
            font-family: var(--primary-font);
        }

        body, html {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background: #fff3e0; transition: background 0.4s ease-in-out;
            user-select: none;
        }

        .wrong-flash { background: #ff4757 !important; transition: 0.2s; }

        .kitchen-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #E0F1FF;
            z-index: 1;
        }

        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.98); border: 12px solid #004a8e;
            border-radius: 50px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            max-width: 1200px; width: 95%; text-align: center; position: relative;
        }

        h1 { font-size: 3rem; color: #0d47a1; font-weight: 700; }
        
        .story-box {
            font-size: 2rem; line-height: 1.5; background: #fffde7;
            border-radius: 30px; border: 5px dashed var(--main-color);
        }

        .deped-logo { position: absolute; top: -75px; left: 10px; width: 140px; }

        .btn-custom {
            font-size: 2.2rem; padding: 15px 50px; border-radius: 100px; border: none;
            font-weight: 700; color: white; box-shadow: 0 10px 0 #0d47a1; cursor: pointer; margin: 5px;
        }
        .btn-ready { background-color: #2196F3; }
        .btn-ready:active { transform: translateY(8px); box-shadow: 0 2px 0 #0d47a1; }
        
        .btn-home { background-color: #28a745 !important; box-shadow: 0 10px 0 #1e7e34 !important; }
        .btn-home:active { transform: translateY(8px); box-shadow: 0 2px 0 #1e7e34 !important; }

        .btn-choice { 
            background-color: white; color: var(--main-color); border: 4px solid var(--main-color); 
            width: 100%; margin-bottom: 12px; text-align: left; padding: 12px 30px;
            font-size: 2rem; border-radius: 30px; box-shadow: 0 8px 0 var(--main-color);
            transition: 0.2s;
        }
        .btn-choice:hover:not(:disabled) { background-color: var(--main-color); color: white; transform: translateX(10px); }

        .choice-marker { font-weight: 700; margin-right: 15px; color: #000; }
        #message { font-size: 2.2rem; margin-top: 10px; font-weight: 700; height: 3rem; }

        #timer-display {
            position: fixed; top: 20px; right: 20px; background: #ff4757; color: white;
            padding: 10px 25px; border-radius: 50px; font-size: 2rem; font-weight: 700;
            border: 4px solid white; z-index: 100;
        }

        .hidden { display: none !important; }
        
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .falling-book {
            position: fixed;
            top: -60px;
            font-size: 40px;
            z-index: 5;
            pointer-events: none;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="kitchen-bg"></div>

    <div id="timer-display" class="hidden">05:00</div>

    <div class="ui-wrapper">
        <div class="main-card" id="card-container">
            <img src="deped.png" class="deped-logo" alt="DepEd Logo">
            
            <div id="content-welcome">
                <h1 class="mb-5">Handa ka na ba?</h1>
                <table style="margin: 0 auto 30px auto;">
                    <tr>
                        <td><img src="rizal.png" alt="Dr. Jose Rizal" style="max-width: 350px; height: auto; animation: float 3s infinite ease-in-out;"></td>
                    </tr>
                </table>
                <button class="btn-custom btn-ready" onclick="showStory()">MAGSIMULA!</button>
            </div>

            <div id="content-story" class="hidden">
                <h1>Basahin Natin</h1>
                <div class="story-box p-4 mt-4 d-flex align-items-center justify-content-between gap-4">
                    <div style="flex: 1;">
                        <div style="text-align: center; margin-bottom: 20px;"><strong>Dr. Jose P. Rizal</strong></div>
                        <p style="text-indent: 50px; margin: 0; text-align: justify;">
                            Si Dr. Jose P. Rizal ay isinilang sa Calamba, Laguna. Isa siyang doktor. Pepe ang kaniyang palayaw. Natutuhan niya ang alpabeto sa edad na tatlo. Taglay niya ang talino mula pagkabata. Siya ang ating pambansang bayani.
                        </p>
                    </div>
                    <img src="rizal.png" alt="Dr. Jose Rizal" style="max-width: 350px; height: auto; animation: float 3s infinite ease-in-out;">
                </div>
                <button class="btn-custom btn-ready mt-5" onclick="startQuiz()">MAGPATULOY</button>
            </div>

            <div id="content-quiz" class="hidden">
                <h2 id="question-text" style="font-size: 2.5rem; font-weight: 700;" class="mb-4"></h2>
                <div id="choices-container"></div>
                <div id="message"></div>
            </div>
        </div>
    </div>

    <audio id="ding" src="https://www.myinstants.com/media/sounds/ding-sound-effect_1.mp3"></audio>
    <audio id="buzzer" src="https://www.myinstants.com/media/sounds/spongebob-fail.mp3"></audio>

    <script>
        const STORY_ID = 'rizal';

        // Check if previous story (kalesanikiko) is completed before allowing access
        async function checkPrerequisite() {
            const userJson = localStorage.getItem('currentUser');
            if (!userJson) {
                window.location.href = '../Main.html';
                return false;
            }

            const user = JSON.parse(userJson);
            
            // Admin can access any story
            if (user.school_id === 'admin') {
                return true;
            }
            
            try {
                const response = await fetch('../get_leaderboard.php?action=user_details&school_id=' + user.school_id);
                const result = await response.json();
                
                if (result.success) {
                    const prevRecord = result.records.find(r => r.story_id === 'kalesanikiko');
                    if (!prevRecord || prevRecord.completed != 1) {
                        alert('Kailangan mo munang makumpleto ang "Kalesa ni Kiko" bago mo laruin ang Dr. Jose P. Rizal!');
                        window.location.href = '../story%20kalesanikiko/kalesanikiko.html';
                        return false;
                    }
                }
            } catch (e) {
                console.error("Error checking prerequisite:", e);
            }
            return true;
        }

        checkPrerequisite();

        async function fetchInitialRetakes() {
            const userJson = localStorage.getItem('currentUser');
            if (!userJson) return;
            const user = JSON.parse(userJson);
            try {
                const response = await fetch('../get_leaderboard.php?action=user_details&school_id=' + user.school_id);
                const result = await response.json();
                if (result.success) {
                    const record = result.records.find(r => r.story_id === STORY_ID);
                    if (record) retakeCount = parseInt(record.retakes) || 0;
                }
            } catch (e) { console.error("Error fetching retakes:", e); }
        }
        fetchInitialRetakes();

        const questions = [
            { q: "Sino ang pambansang bayani?", opt: ["Andres", "Cardo", "Jose P. Rizal", "Juan"], ans: 2 },
            { q: "Ilan taon niya natutunan ang alpabeto?", opt: ["3", "4", "5", "6"], ans: 0 },
            { q: "Ano ang katangian ni Jose Rizal?", opt: ["madamot", "masungit", "matalino", "tamad"], ans: 2 },
            { q: "Ano ang palayaw niya?", opt: ["Enteng", "Jose", "Pepe", "Potpot"], ans: 2 },
            { q: "Saan ipinanganak ating Pambansang bayani?", opt: ["Biñan", "Calamba", "Maynila", "Sta. Rosa"], ans: 1 }
        ];

        let currentQ = 0;
        let score = 0;
        let bookInterval;
        let retakeCount = 0;
        let quizStarted = false;
        let isSaved = false;
        let timeLeft = 300;
        let timerStarted = false;
        let timerInterval;

        function shootConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#0d47a1', '#2196f3', '#ffffff', '#ff9800']
            });
        }

        function showStory() {
            document.getElementById('ding').play();
            document.querySelector('.kitchen-bg').style.background = '#D9E9F6';
            document.getElementById('content-welcome').classList.add('hidden');
            const story = document.getElementById('content-story');
            story.classList.remove('hidden');
            story.classList.add('fade-in');
        }

        function startQuiz() {
            document.getElementById('ding').play();
            quizStarted = true;
            document.getElementById('content-story').classList.add('hidden');
            const quiz = document.getElementById('content-quiz');
            quiz.classList.remove('hidden');
            quiz.classList.add('fade-in');
            stopBookRain();
            document.getElementById('timer-display').classList.remove('hidden');
            if(!timerStarted) { startTimer(); timerStarted = true; }
            loadQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    let mins = Math.floor(timeLeft / 60);
                    let secs = timeLeft % 60;
                    document.getElementById('timer-display').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                } else {
                    clearInterval(timerInterval);
                    finish();
                }
            }, 1000);
        }

        function resetQuiz() {
            currentQ = 0;
            score = 0;
            isSaved = false;
            timeLeft = 300;
            clearInterval(timerInterval);
            timerStarted = false;
            
            document.getElementById('content-quiz').innerHTML = `
                <h2 id="question-text" style="font-size: 2.5rem; font-weight: 700;" class="mb-4"></h2>
                <div id="choices-container"></div><div id="message"></div>
            `;
            
            document.getElementById('content-quiz').classList.add('hidden');
            document.getElementById('content-welcome').classList.remove('hidden');
            document.getElementById('timer-display').classList.add('hidden');
            startBookRain();
        }

        function loadQuestion() {
            const data = questions[currentQ];
            document.getElementById('question-text').innerHTML = `<span style="color:#0d47a1">${currentQ + 1}.</span> ${data.q}`;
            
            const container = document.getElementById('choices-container');
            container.innerHTML = "";
            document.getElementById('message').innerText = "";
            
            data.opt.forEach((val, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-choice";
                const letter = String.fromCharCode(65 + idx);
                btn.innerHTML = `<span class="choice-marker">${letter}.</span> ${val}`;
                
                btn.onclick = () => {
                    const allBtns = container.querySelectorAll('.btn-choice');
                    allBtns.forEach(b => b.disabled = true);

                    if(idx === data.ans) {
                        score++;
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                        document.getElementById('ding').play();
                        document.getElementById('message').innerHTML = "<span style='color:#2ecc71'>⭐ TAMA! ⭐</span>";
                    } else {
                        document.body.classList.add('wrong-flash');
                        setTimeout(() => document.body.classList.remove('wrong-flash'), 400);
                        document.getElementById('buzzer').play();
                        btn.classList.add('shake');
                        document.getElementById('message').innerHTML = "<span style='color:#e74c3c'>❌ Subukan Muli! ❌</span>";
                    }

                    setTimeout(() => {
                        currentQ++;
                        if(currentQ < questions.length) loadQuestion();
                        else finish();
                    }, 1500);
                };
                container.appendChild(btn);
            });
        }

        async function finish() {
            const quizNode = document.getElementById('content-quiz');
            const isPerfect = (score === questions.length);
            if(!isPerfect) retakeCount++;

            const userJson = localStorage.getItem('currentUser');
            if(userJson) {
                const user = JSON.parse(userJson);
                await fetch('../save_progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        school_id: user.school_id,
                        story_id: STORY_ID,
                        is_perfect: isPerfect
                    })
                }).catch(e => console.error("Error saving result:", e));
                isSaved = true;
            }

            if(isPerfect) {
                shootConfetti();
                setTimeout(() => {
                    window.location.href = '../Main.html?completed=' + encodeURIComponent(STORY_ID);
                }, 2000);
            }
            
            let resultHTML = `
                <h1 class="mb-4">${isPerfect ? '🏆 NAPAKAHUSAY! 🏆' : 'KAYA MO \'YAN!'}</h1>
                <div style="font-size: 5rem; color: #ff9800; font-weight: 700;" class="mb-4">${score} / ${questions.length}</div>
                <div style="font-size: 2rem; color: #0d47a1;" class="mb-4">Bilang ng Ulit: ${retakeCount}</div>
                <p style="font-size: 2rem;">
                    ${isPerfect 
                        ? 'Handa ka na para sa susunod na aralin!' 
                        : 'Subukan muli para makuha ang perpektong score.'}
                </p>
                <div class="d-flex flex-column gap-3 align-items-center">
                ${isPerfect 
                    ? `<p style="font-size: 1.5rem;">Naglo-load ng susunod na aralin...</p>` 
                    : `<button class="btn-custom btn-ready mt-4" onclick="setTimeout(resetQuiz, 1000)">ULITIN 🔄</button>`
                }
                <button class="btn-custom btn-home mt-3" onclick="setTimeout(goHome, 1000)">HOME 🏠</button>
                    ${isPerfect 
                        ? `<p style="font-size: 1.5rem;">Naglo-load ng susunod na aralin...</p>` 
                        : `<button class="btn-custom btn-ready mt-4" onclick="setTimeout(resetQuiz, 1000)">ULITIN 🔄</button>`
                    }
                    <button class="btn-custom btn-home mt-3" onclick="setTimeout(goHome, 1000)">HOME 🏠</button>
                </div>
            `;

            document.body.style.pointerEvents = 'none';
            setTimeout(() => {
                document.querySelectorAll('.main-card > div').forEach(div => div.classList.add('hidden'));
                quizNode.classList.remove('hidden');
                quizNode.innerHTML = resultHTML;
                document.body.style.pointerEvents = 'auto';
            }, 1000);

            document.getElementById('timer-display').classList.add('hidden');
        }

        function goHome() {
            const leave = () => { window.location.href = '../Main.html'; };
            if(quizStarted && !isSaved) {
                if(confirm("Maaring hindi masave ang iyong quiz. Sigurado ka ba?")) {
                    setTimeout(leave, 1000);
                }
            } else {
                setTimeout(leave, 1000);
            }
        }

        window.onbeforeunload = function() {
            if(quizStarted && !isSaved) {
                return "Maaring hindi masave ang iyong quiz. Sigurado ka ba?";
            }
        };

        function startBookRain() {
            bookInterval = setInterval(() => {
                const book = document.createElement('div');
                book.classList.add('falling-book');
                book.innerText = '📘';
                book.style.left = Math.random() * 95 + 'vw';
                const duration = Math.random() * 3 + 4;
                book.style.animation = `fall ${duration}s linear`;
                document.body.appendChild(book);
                setTimeout(() => book.remove(), duration * 1000);
            }, 800);
        }

        function stopBookRain() {
            clearInterval(bookInterval);
            document.querySelectorAll('.falling-book').forEach(el => el.remove());
        }
        startBookRain();
    </script>
</body>
</html>
