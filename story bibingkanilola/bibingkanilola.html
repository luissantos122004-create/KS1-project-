<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibingka Ni Lola Binay - Interactive Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @font-face {
            font-family: 'Alfabeto';
            src: url('Alfabeto.ttf') format('truetype');
        }
        :root {
            --primary-font: 'Alfabeto', 'Fredoka', 'Arial Rounded MT Bold', sans-serif;
            --main-color: #0d47a1; 
            --accent-color: #2196f3; 
        }

        body, html {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            font-family: var(--primary-font);
            background: #6d4c41;
            user-select: none;
        }

        .kitchen-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #8d6e63;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(0,0,0,.05) 35px, rgba(0,0,0,.05) 70px);
            z-index: 1;
            transition: all 0.8s ease-in-out;
        }

        .white-background-active {
            background-color: #ffffff !important;
            background-image: none !important;
        }

        .bg-bibingka {
            position: absolute;
            width: 150px;
            opacity: 0.4;
            animation: tableShake 4s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes tableShake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2px, 2px) rotate(1deg); }
            50% { transform: translate(-2px, 1px) rotate(-1deg); }
            75% { transform: translate(1px, -2px) rotate(0.5deg); }
        }

        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.98); 
            border: 12px solid var(--main-color);
            border-radius: 50px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            max-width: 1000px; width: 95%; text-align: center; position: relative;
        }

        .deped-logo { position: absolute; top: -75px; left: 10px; width: 140px; }

        h1 { font-size: 3.2rem; color: var(--main-color); font-weight: 700; }
        
        .story-box {
            font-size: 2.2rem; line-height: 1.6; background: #fffde7;
            border-radius: 30px; border: 5px dashed var(--main-color); text-align: justify;
        }

        .btn-custom {
            font-size: 2.2rem; padding: 15px 60px; border-radius: 100px; border: none;
            font-weight: 700; color: white; box-shadow: 0 10px 0 #08306b; cursor: pointer;
            transition: 0.1s; margin: 5px;
        }
        .btn-ready { background-color: var(--main-color); }
        .btn-ready:active { transform: translateY(8px); box-shadow: 0 2px 0 #08306b; }
        
        .btn-home { background-color: #28a745 !important; box-shadow: 0 10px 0 #1e7e34 !important; }
        .btn-home:active { transform: translateY(8px); box-shadow: 0 2px 0 #1e7e34 !important; }

        .btn-choice { 
            background-color: white; color: var(--main-color); border: 4px solid var(--main-color); 
            width: 100%; margin-bottom: 15px; text-align: left; padding: 15px 35px;
            font-size: 2rem; border-radius: 35px; box-shadow: 0 8px 0 var(--main-color);
            transition: 0.2s;
        }
        .btn-choice:hover:not(:disabled) { background-color: var(--main-color); color: white; transform: scale(1.02); }

        .shake-img { animation: tableShake 0.6s infinite; }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.6s ease-in-out; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #message { font-size: 2.5rem; font-weight: 700; height: 3.5rem; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="bg-layer" class="kitchen-bg">
        <img src="bibingka.png" class="bg-bibingka" style="top: 5%; left: 5%;">
        <img src="bibingka.png" class="bg-bibingka" style="bottom: 5%; right: 5%;">
    </div>

    <div class="ui-wrapper">
        <div class="main-card">
            <img src="deped.png" class="deped-logo" alt="DepEd Logo">
            
            <div id="content-welcome">
                <h1 class="mb-5">Handa Ka Na Ba Sa Kwento ni Lola Binay?</h1>
                <div class="mb-5">
                    <img src="bibingka.png" alt="Bibingka" class="shake-img" style="max-width: 380px; height: auto;">
                </div>
                <button class="btn-custom btn-ready" onclick="showStory()">MAGSIMULA!</button>
            </div>

            <div id="content-story" class="hidden">
                <h1 class="mb-4">Basahin Natin 📖</h1>
                <h2 style="text-align: center; font-size: 2.5rem; color: #e65100 !important; font-weight: bold;">Bibingka Ni Lola Binay</h2>
                <div class="story-box p-4 mt-3">
                    <p style="text-indent: 2rem; margin-bottom: 0;">May mga bibingka si Lola Binay. Lima ang mga bibingka sa basket. Pupunta siya sa palengke ng Binyang. Ibebenta ni Lola Binay ang mga bibingka.</p>
                </div>
                <button class="btn-custom btn-ready mt-5" onclick="startQuiz()">MAGPATULOY 🚀</button>
            </div>

            <div id="content-quiz" class="hidden">
                <h2 id="question-text" style="font-size: 2.8rem; font-weight: 700;" class="mb-4"></h2>
                <div id="choices-container"></div>
                <div id="message"></div>
            </div>
        </div>
    </div>

    <audio id="ding" src="https://www.myinstants.com/media/sounds/ding-sound-effect_1.mp3"></audio>
    <audio id="buzzer" src="https://www.myinstants.com/media/sounds/spongebob-fail.mp3"></audio>

    <script>
        const STORY_ID = 'bibingka';

        const questions = [
            { q: "Sino ang lola sa kuwento?", opt: ["Lola Basyang", "Lola Belen", "Lola Bene", "Lola Binay"], ans: 3 },
            { q: "Ano ang nasa basket?", opt: ["banana cue", "bibingka", "biko", "buko"], ans: 1 },
            { q: "Ilan ang mga bibingka?", opt: ["apat", "dalawa", "isa", "lima"], ans: 3 },
            { q: "Saan pupunta si Lola Binay?", opt: ["Binyang", "Calamba", "Liliw", "San Pedro"], ans: 0 },
            { q: "Ano ang gagawin sa bibingka?", opt: ["ibebenta", "ipamimigay", "itatago", "kakainin"], ans: 0 }
        ];

        let currentQ = 0;
        let score = 0;
        let retakeCount = 0;
        let quizStarted = false;
        let isSaved = false;

        async function fetchInitialRetakes() {
            const userJson = localStorage.getItem('currentUser');
            if (!userJson) return;
            const user = JSON.parse(userJson);
            try {
                const response = await fetch('../get_leaderboard.php?action=user_details&school_id=' + user.school_id);
                const result = await response.json();
                if (result.success) {
                    const record = result.records.find(r => r.story_id === STORY_ID);
                    if (record) retakeCount = parseInt(record.retakes) || 0;
                }
            } catch (e) { console.error("Error fetching retakes:", e); }
        }
        fetchInitialRetakes();

        function shootConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#0d47a1', '#2196f3', '#ffffff', '#ff9800']
            });
        }

        function resetQuiz() {
            currentQ = 0;
            score = 0;
            isSaved = false;
            
            document.getElementById('content-quiz').innerHTML = `
                <h2 id="question-text" style="font-size: 2.8rem; font-weight: 700;" class="mb-4"></h2>
                <div id="choices-container"></div>
                <div id="message"></div>
            `;
            
            document.getElementById('content-quiz').classList.add('hidden');
            document.getElementById('content-welcome').classList.remove('hidden');
            document.getElementById('bg-layer').classList.remove('white-background-active');
            
            const floats = document.querySelectorAll('.bg-bibingka');
            floats.forEach(f => f.style.display = 'block');
        }

        function showStory() {
            document.getElementById('ding').play();
            const bg = document.getElementById('bg-layer');
            bg.classList.add('white-background-active');
            const floats = document.querySelectorAll('.bg-bibingka');
            floats.forEach(f => f.style.display = 'none');
            document.getElementById('content-welcome').classList.add('hidden');
            const story = document.getElementById('content-story');
            story.classList.remove('hidden');
            story.classList.add('fade-in');
        }

        function startQuiz() {
            document.getElementById('ding').play();
            quizStarted = true;
            document.getElementById('content-story').classList.add('hidden');
            const quiz = document.getElementById('content-quiz');
            quiz.classList.remove('hidden');
            quiz.classList.add('fade-in');
            loadQuestion();
        }

        function loadQuestion() {
            const data = questions[currentQ];
            document.getElementById('question-text').innerHTML = `<span style="color:var(--main-color)">${currentQ + 1}.</span> ${data.q}`;
            const container = document.getElementById('choices-container');
            container.innerHTML = "";
            document.getElementById('message').innerText = "";
            
            data.opt.forEach((val, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-choice";
                const letter = String.fromCharCode(65 + idx);
                btn.innerHTML = `<span style="font-weight:bold; margin-right:20px;">${letter}.</span> ${val}`;
                
                btn.onclick = () => {
                    const allBtns = container.querySelectorAll('.btn-choice');
                    allBtns.forEach(b => b.disabled = true);

                    if(idx === data.ans) {
                        score++;
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                        document.getElementById('ding').play();
                        document.getElementById('message').innerHTML = "<span style='color:#2ecc71'>⭐ TAMA! Napakahusay! ⭐</span>";
                    } else {
                        document.getElementById('buzzer').play();
                        document.getElementById('message').innerHTML = "<span style='color:#e74c3c'>❌ Mali! Subukan muli. ❌</span>";
                    }

                    setTimeout(nextQuestion, 1800);
                };
                container.appendChild(btn);
            });
        }

        function nextQuestion() {
            currentQ++;
            if(currentQ < questions.length) loadQuestion();
            else finish();
        }
async function finish() {
            const quizNode = document.getElementById('content-quiz');
            const isPerfect = (score === questions.length);
            if(!isPerfect) retakeCount++;

            const userJson = localStorage.getItem('currentUser');
            if(userJson) {
                const user = JSON.parse(userJson);
                await fetch('../save_progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        school_id: user.school_id,
                        story_id: STORY_ID,
                        is_perfect: isPerfect
                    })
                }).catch(e => console.error("Error saving result:", e));
                isSaved = true;
            }

            if(isPerfect) {
                shootConfetti();
                setTimeout(() => {
                    window.location.href = '../Main.html?completed=' + encodeURIComponent(STORY_ID);
                }, 2000);
            }

            let resultHTML = `
                <h1 class="mb-4">${isPerfect ? '🏆 NAPAKAHUSAY! 🏆' : 'KAYA MO \'YAN!'}</h1>
                <div style="font-size: 5rem; color: #ff9800; font-weight: 700;" class="mb-4">${score} / ${questions.length}</div>
                <div style="font-size: 2rem; color: #0d47a1;" class="mb-4">Bilang ng Ulit: ${retakeCount}</div>
                <p style="font-size: 2rem;">
                    ${isPerfect 
                        ? 'Handa ka na para sa susunod na aralin!' 
                        : 'Subukan muli para makuha ang perpektong score.'}
                </p>
                <div class="d-flex flex-column gap-3 align-items-center">
                    ${isPerfect 
                        ? `<p style="font-size: 1.5rem;">Naglo-load ng susunod na aralin...</p>` 
                        : `<button class="btn-custom btn-ready mt-4" onclick="setTimeout(resetQuiz, 1000)">ULITIN 🔄</button>`
                    }
                    <button class="btn-custom btn-home mt-3" onclick="setTimeout(goHome, 1000)">HOME 🏠</button>
                </div>
            `;

            document.body.style.pointerEvents = 'none';
            setTimeout(() => {
                document.querySelectorAll('.main-card > div').forEach(div => div.classList.add('hidden'));
                quizNode.classList.remove('hidden');
                quizNode.innerHTML = resultHTML;
                document.body.style.pointerEvents = 'auto';
            }, 1000);

            document.getElementById('timer-display').classList.add('hidden');
        }

        function goHome() {
            const leave = () => { window.location.href = '../Main.html'; };
            if(quizStarted && !isSaved) {
                if(confirm("Maaring hindi masave ang iyong quiz. Sigurado ka ba?")) {
                    setTimeout(leave, 1000);
                }
            } else {
                setTimeout(leave, 1000);
            }
        }

        window.onbeforeunload = function() {
            if(quizStarted && !isSaved) {
                return "Maaring hindi masave ang iyong quiz. Sigurado ka ba?";
            }
        };
    </script>
</body>
</html>
