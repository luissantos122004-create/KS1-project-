<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ang Gagamba Interactive Quiz - DepEd Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @font-face {
            font-family: 'Alfabeto';
            src: url('Alfabeto.ttf') format('truetype');
        }
        :root {
            --primary-font: 'Alfabeto', 'Fredoka', cursive, sans-serif;
            --theme-dark: #1e4d2e;
            --theme-main: #27ae60;
            --theme-light: #e8f8f5;
            --theme-accent: #2ecc71;
        }

        body, html {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            font-family: var(--primary-font);
            background: #0b2e13; transition: background 0.4s ease-in-out;
            user-select: none;
        }

        .wrong-flash { background: #ff4757 !important; transition: 0.2s; }

        /* --- BACKGROUNDS (WEB BACKGROUND INCLUDED) --- */
        .theme-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0b2e13;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='rgba(255,255,255,0.15)' stroke-width='1' fill='none'%3E%3Cpath d='M 50 0 V 100 M 0 50 H 100'/%3E%3Cpath d='M 0 0 L 100 100 M 0 100 L 100 0'/%3E%3Ccircle cx='50' cy='50' r='10'/%3E%3Ccircle cx='50' cy='50' r='25'/%3E%3Ccircle cx='50' cy='50' r='40'/%3E%3C/g%3E%3C/svg%3E");
            background-repeat: repeat;
            z-index: 1; transition: opacity 0.8s ease, transform 0.8s ease;
        }

        /* --- BOUNCING SPIDER ANIMATION --- */
        .spider-wrapper {
            position: absolute; width: 100%; height: 100%; z-index: 2; overflow: hidden;
            pointer-events: none; 
        }

        .bouncing-spider {
            position: absolute;
            width: 150px; 
            height: auto;
            /* Bouncing DVD Screensaver Effect */
            animation: bounceX 12s linear infinite alternate,
                       bounceY 8s linear infinite alternate;
            filter: drop-shadow(3px 5px 4px rgba(0,0,0,0.5));
        }

        @keyframes bounceX {
            from { left: 0; }
            to { left: calc(100% - 150px); } 
        }

        @keyframes bounceY {
            from { top: 0; }
            to { top: calc(100% - 150px); } 
        }

        /* --- UI WRAPPER --- */
        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.98); border: 12px solid var(--theme-dark);
            border-radius: 50px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 1000px; width: 95%; text-align: center; position: relative;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .deped-logo { 
            position: absolute; top: -75px; left: 40px; width: 140px; 
            z-index: 20; transition: all 0.3s ease;
        }

        .zoom-out-wow { transform: scale(0) rotate(10deg); opacity: 0; }
        .bounce-in-wow { animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .white-bg-active { background: #ffffff !important; }
        .hide-bg { opacity: 0 !important; transform: scale(1.1); pointer-events: none; }

        h1 { font-size: 3.5rem; color: var(--theme-dark); font-weight: 700; }
        
        .story-box {
            font-size: 2.2rem; line-height: 1.4; background: #e8f8f5;
            border-radius: 30px; border: 5px dashed var(--theme-dark); position: relative;
        }

        .story-img {
            max-width: 250px; 
            height: auto;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        #timer-display {
            position: fixed; top: 20px; right: 20px; background: #ff4757; color: white;
            padding: 10px 25px; border-radius: 50px; font-size: 2rem; font-weight: 700;
            border: 4px solid white; z-index: 100;
        }

        .btn-custom {
            font-size: 2.5rem; padding: 20px 60px; border-radius: 100px; border: none;
            font-weight: 700; color: white; box-shadow: 0 10px 0 #145c32; cursor: pointer;
            font-family: var(--primary-font);
        }
        .btn-ready { background-color: var(--theme-main); }
        .btn-ready:active { transform: translateY(8px); box-shadow: 0 2px 0 #145c32; }

        .btn-audio {
            background: var(--theme-main); color: white; border: none; border-radius: 50%;
            width: 70px; height: 70px; font-size: 2rem; box-shadow: 0 6px 0 #145c32;
            margin-bottom: 10px; transition: 0.2s;
        }

        .btn-choice { 
            background-color: white; color: var(--theme-dark); border: 4px solid var(--theme-dark); 
            width: 100%; margin-bottom: 12px; text-align: left; padding: 12px 30px;
            font-size: 2.2rem; border-radius: 30px; box-shadow: 0 8px 0 var(--theme-dark);
            transition: transform 0.2s; font-family: var(--primary-font);
        }
        
        .choice-marker { font-weight: 700; margin-right: 15px; color: #000000; }
        .btn-choice:hover:not(:disabled) { background-color: var(--theme-dark); color: white; transform: translateX(10px); }

        #message { font-size: 2.5rem; margin-top: 5px; min-height: 3rem; font-weight: 700; }
        .hidden { display: none !important; }

        /* --- DRAWING SECTION --- */
        #drawing-area {
            position: relative; width: 600px; height: 300px; margin: 10px auto;
            border: 4px dashed #ccc; background: #fff; touch-action: none;
            overflow: hidden; border-radius: 20px;
        }
        #trace-canvas { position: absolute; top: 0; left: 0; z-index: 2; cursor: none; }

        .draw-toolbar { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .tool-btn {
            background: white; border: 4px solid var(--theme-dark); border-radius: 15px;
            padding: 8px 20px; font-size: 1.2rem; cursor: pointer; transition: 0.2s;
            font-weight: 700; font-family: var(--primary-font);
        }
        .tool-btn.active { background: var(--theme-dark); color: white; transform: scale(1.05); }

        .btn-submit { background-color: #2ecc71; box-shadow: 0 8px 0 #27ae60; margin-top: 20px; }
        .btn-submit:active { transform: translateY(4px); box-shadow: 0 4px 0 #27ae60; }

        #custom-cursor { 
            position: fixed; pointer-events: none; z-index: 1000; font-size: 3rem;
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
        }
        .cursor-pencil { transform: translate(-5px, -35px); } 
        .cursor-eraser { transform: translate(-25px, -25px); }

        .score-text { font-size: 4rem; color: var(--theme-main); font-weight: 700; }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div class="theme-container" id="main-bg">
        <div class="spider-wrapper">
            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M 40 50 Q 20 20 10 40 M 40 55 Q 15 40 5 60 M 40 60 Q 20 70 10 80 M 45 65 Q 30 90 20 95 M 60 50 Q 80 20 90 40 M 60 55 Q 85 40 95 60 M 60 60 Q 80 70 90 80 M 55 65 Q 70 90 80 95' fill='none' stroke='%23111' stroke-width='4' stroke-linecap='round'/><ellipse cx='50' cy='65' rx='15' ry='20' fill='%23222'/><circle cx='50' cy='45' r='12' fill='%23111'/><circle cx='46' cy='42' r='2' fill='white'/><circle cx='54' cy='42' r='2' fill='white'/></svg>" alt="Bouncing Spider" class="bouncing-spider">
        </div>
    </div>

    <div id="custom-cursor" class="hidden cursor-pencil">✏️</div>
    <div id="timer-display" class="hidden">05:00</div>

    <div class="ui-wrapper">
        <div class="main-card" id="card-container">
            
            <img src="deped.png" class="deped-logo" alt="DepEd Logo">

            <div id="content-welcome">
                <h1 class="mb-5" style="color: black;">Handa Ka Na Ba?</h1>
                <button class="btn-custom btn-ready" style="color: black;" onclick="triggerWowForStory()">MAGSIMULA!</button>
            </div>

            <div id="content-story" class="hidden">
                <div class="d-flex justify-content-between align-items-center">
                    <h1>Ang Gagamba</h1>
                    <button class="btn-audio" onclick="document.getElementById('ding').play()">🔊</button>
                </div>
                
                <div class="story-box p-4 mt-4 d-flex align-items-center justify-content-between text-start gap-4">
                    <div>
                        May bagong alaga si Kuya Gino. Gumagapang ito sa walis tingting. Sinasanay raw niya ang kaniyang alaga. Sasali pala sila sa labanan ng gagamba.
                    </div>
                    <img src="anggagamba.png" alt="Ang Gagamba Pic" class="story-img">
                </div>

                <button class="btn-custom btn-ready mt-5" onclick="startQuiz()">MAGPATULOY </button>
            </div>

            <div id="content-quiz" class="hidden">
                <div class="mb-3">
                    <h2 id="question-text" style="font-size: 2.8rem; font-weight: 700; color: #004a8e;"></h2>
                </div>
                
                <div id="drawing-container" class="hidden">
                    <div id="drawing-area">
                        <canvas id="trace-canvas" width="600" height="300"></canvas>
                    </div>
                    <div class="draw-toolbar">
                        <button id="btn-pencil" class="tool-btn active" onclick="setTool('pencil')">✏️ Lapis</button>
                        <button id="btn-eraser" class="tool-btn" onclick="setTool('eraser')">🧽 Eraser</button>
                        <button class="tool-btn" style="border-color: #ff4757; color: #ff4757;" onclick="clearCanvas()">🗑️ Ulitin</button>
                    </div>
                    <button class="btn-custom btn-submit" onclick="submitDrawing()">IPASA ANG GAWA 📄</button>
                </div>

                <div id="choices-container"></div>
                <div id="message" class="fw-bold"></div>
            </div>
        </div>
    </div>

    <audio id="ding" src="https://www.myinstants.com/media/sounds/ding-sound-effect_1.mp3"></audio>
    <audio id="buzzer" src="https://www.myinstants.com/media/sounds/spongebob-fail.mp3"></audio>

    <script>
        const questions = [
            { q: "Ano ang alaga ni Kuya Gino?", opt: ["gagamba", "langgam", "surot"], ans: 0 },
            { q: "Ano ang ginagawa ng gagamba?", opt: ["gumagapang", "kumakain", "naliligo"], ans: 0 },
            { q: "Saan gumagapang ang gagamba?", opt: ["bato", "kahoy", "tingting"], ans: 2 },
            { q: "Ano ang ginagawa ni Kuya sa gagamba?", opt: ["itinapon", "kinakausap", "sinasanay"], ans: 2 },
            { q: "Bakit sinasanay ang gagamba?", opt: ["Ibebenta sa tindahan", "Ipamimigay ito", "Sasali sa labanan"], ans: 2 },
            { q: "Iguhit ang Gagamba para manalo!", type: "draw" }
        ];

        let currentQ = 0;
        let score = 0;
        let timeLeft = 300;
        let timerStarted = false;
        let retakeCount = 0;
        let timerInterval;
        let canvas, ctx, drawing = false;
        let currentTool = 'pencil';
        let pointsDrawn = 0;
        let canvasInitialized = false;
        const customCursor = document.getElementById('custom-cursor');

        function shootConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#004a8e', '#4cc9f0', '#ffffff', '#27ae60']
            });
        }

        function triggerWrongEffect() {
            document.body.classList.add('wrong-flash');
            setTimeout(() => document.body.classList.remove('wrong-flash'), 400);
        }

        function initCanvas() {
            if (canvasInitialized) return;
            canvas = document.getElementById('trace-canvas');
            if (!canvas) return;
            ctx = canvas.getContext('2d');
            ctx.lineCap = "round"; ctx.lineJoin = "round";
            setTool('pencil');

            const moveCursor = (e) => {
                customCursor.style.left = (e.clientX || e.pageX) + "px";
                customCursor.style.top = (e.clientY || e.pageY) + "px";
            };

            const startDraw = (e) => { drawing = true; draw(e); };
            const stopDraw = () => { drawing = false; ctx.beginPath(); };

            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', (e) => { moveCursor(e); draw(e); });
            window.addEventListener('mouseup', stopDraw);
            canvas.addEventListener('touchstart', (e) => { 
                e.preventDefault(); moveCursor(e.touches[0]); startDraw(e.touches[0]); 
            });
            canvas.addEventListener('touchmove', (e) => { 
                e.preventDefault(); moveCursor(e.touches[0]); draw(e.touches[0]); 
            });
            canvas.addEventListener('touchend', stopDraw);
            canvas.addEventListener('mouseenter', () => customCursor.classList.remove('hidden'));
            canvas.addEventListener('mouseleave', () => customCursor.classList.add('hidden'));
            canvasInitialized = true;
        }

        function setTool(tool) {
            currentTool = tool;
            document.getElementById('btn-pencil').classList.toggle('active', tool === 'pencil');
            document.getElementById('btn-eraser').classList.toggle('active', tool === 'eraser');
            if (tool === 'pencil') {
                ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = "#004a8e"; ctx.lineWidth = 15;
                customCursor.innerHTML = "✏️"; customCursor.className = "cursor-pencil";
            } else {
                ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 30;
                customCursor.innerHTML = "🧽"; customCursor.className = "cursor-eraser";
            }
        }

        function draw(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.pageX) - rect.left;
            const y = (e.clientY || e.pageY) - rect.top;
            ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
            if(currentTool === 'pencil') pointsDrawn++;
        }

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); pointsDrawn = 0; }

        function submitDrawing() {
            if (pointsDrawn < 50) {
                document.getElementById('message').innerHTML = "<span style='color:#e67e22'>Iguhit mo muna ang Gagamba! 🕷️</span>";
                return;
            }
            score++;
            shootConfetti();
            document.getElementById('ding').play();
            document.getElementById('message').innerHTML = "<span style='color:#2ecc71'>✨ NAPAKAGALING NA GAWA! ✨</span>";
            customCursor.classList.add('hidden');
            setTimeout(finish, 1500);
        }

        function triggerWowForStory() {
            document.getElementById('ding').play();
            const card = document.getElementById('card-container');
            
            // Adjust header text color so it matches the white box style
            document.querySelector('#content-welcome h1').style.color = '#1e4d2e';
            
            card.classList.add('zoom-out-wow');
            setTimeout(() => {
                document.getElementById('content-welcome').classList.add('hidden');
                document.getElementById('content-story').classList.remove('hidden');
                card.classList.remove('zoom-out-wow');
                card.classList.add('bounce-in-wow');
            }, 700);
        }

        function startQuiz() {
            document.getElementById('ding').play();
            
            // Apply requested design changes: white background, blue borders
            document.body.style.background = '#ffffff';
            document.getElementById('card-container').style.borderColor = '#004a8e';
            
            // Hide the spider and web background
            document.getElementById('main-bg').style.display = 'none';

            document.getElementById('content-story').classList.add('hidden');
            document.getElementById('content-quiz').classList.remove('hidden');
            document.getElementById('timer-display').classList.remove('hidden');
            
            if(!timerStarted) { startTimer(); timerStarted = true; }
            loadQuestion();
        }

        function resetQuiz() {
            retakeCount++;
            currentQ = 0;
            score = 0;
            pointsDrawn = 0;
            
            // Restore Quiz HTML Structure
            document.getElementById('content-quiz').innerHTML = `
                <div class="mb-3"><h2 id="question-text" style="font-size: 2.8rem; font-weight: 700; color: #004a8e;"></h2></div>
                <div id="drawing-container" class="hidden">
                    <div id="drawing-area"><canvas id="trace-canvas" width="600" height="300"></canvas></div>
                    <div class="draw-toolbar">
                        <button id="btn-pencil" class="tool-btn active" onclick="setTool('pencil')">✏️ Lapis</button>
                        <button id="btn-eraser" class="tool-btn" onclick="setTool('eraser')">🧽 Eraser</button>
                        <button class="tool-btn" style="border-color: #ff4757; color: #ff4757;" onclick="clearCanvas()">🗑️ Ulitin</button>
                    </div>
                    <button class="btn-custom btn-submit" onclick="submitDrawing()">IPASA ANG GAWA 📄</button>
                </div>
                <div id="choices-container"></div><div id="message" class="fw-bold"></div>
            `;
            canvasInitialized = false;
            timeLeft = 300;
            clearInterval(timerInterval);
            timerStarted = false;

            document.getElementById('content-quiz').classList.add('hidden');
            document.getElementById('content-welcome').classList.remove('hidden');
            document.getElementById('card-container').classList.remove('zoom-out-wow', 'bounce-in-wow');
            document.getElementById('main-bg').style.display = 'block';
            document.body.style.background = '#0b2e13';
            document.getElementById('card-container').style.borderColor = '#1e4d2e';
            document.getElementById('timer-display').classList.add('hidden');
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    let mins = Math.floor(timeLeft / 60);
                    let secs = timeLeft % 60;
                    document.getElementById('timer-display').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                } else {
                    clearInterval(timerInterval);
                    finish();
                }
            }, 1000);
        }

        function loadQuestion() {
            const data = questions[currentQ];
            document.getElementById('question-text').innerHTML = `<span style="color:#000000">${currentQ + 1}.</span> ${data.q}`;
            
            const container = document.getElementById('choices-container');
            const drawContainer = document.getElementById('drawing-container');
            container.innerHTML = "";
            document.getElementById('message').innerText = "";
            
            if (data.type === "draw") {
                container.classList.add('hidden');
                drawContainer.classList.remove('hidden');
                initCanvas();
            } else {
                container.classList.remove('hidden');
                drawContainer.classList.add('hidden');
                data.opt.forEach((val, idx) => {
                    const btn = document.createElement('button');
                    
                    // Set blue styles for quiz buttons
                    btn.className = "btn-choice";
                    btn.style.borderColor = "#004a8e"; 
                    btn.style.color = "#004a8e";
                    btn.style.boxShadow = "0 8px 0 #004a8e";
                    
                    const letter = String.fromCharCode(65 + idx);
                    btn.innerHTML = `<span class="choice-marker">${letter}.</span> ${val}`;
                    
                    btn.onmouseover = () => { if(!btn.disabled) { btn.style.backgroundColor = "#004a8e"; btn.style.color = "white"; }};
                    btn.onmouseout = () => { if(!btn.disabled) { btn.style.backgroundColor = "white"; btn.style.color = "#004a8e"; }};
                    
                    btn.onclick = () => {
                        if(idx === data.ans) {
                            score++;
                            shootConfetti();
                            document.getElementById('ding').play();
                            document.getElementById('message').innerHTML = "<span style='color:#2ecc71'>⭐ TAMA! ⭐</span>";
                        } else {
                            triggerWrongEffect();
                            document.getElementById('buzzer').currentTime = 0;
                            document.getElementById('buzzer').play();
                            btn.classList.add('shake');
                            document.getElementById('message').innerHTML = "<span style='color:#e74c3c'>❌ Subukan Muli! ❌</span>";
                        }
                        const allBtns = container.querySelectorAll('.btn-choice');
                        allBtns.forEach(b => b.disabled = true);
                        setTimeout(() => {
                            currentQ++;
                            if(currentQ < questions.length) loadQuestion();
                            else finish();
                        }, 1500);
                    };
                    container.appendChild(btn);
                });
            }
        }

        function finish() {
            const quizNode = document.getElementById('content-quiz');
            const isPerfect = (score >= questions.length);
            
            if(isPerfect) {
                shootConfetti();
                setTimeout(shootConfetti, 500);
                localStorage.setItem(`story_completed_${currentUser}_gagamba`, 'true');
            }

            // SAVE TO LEADERBOARD (Record immediately)
            const currentUser = localStorage.getItem('currentUser');
            if(currentUser) {
                let leaderboard = JSON.parse(localStorage.getItem('leaderboard')) || {};
                if(!leaderboard[currentUser]) leaderboard[currentUser] = {};
                
                const currentData = leaderboard[currentUser]['gagamba'] || { score: 0, retakes: 0 };
                // Update if perfect, or if we just want to record the latest retake count for an incomplete attempt
                // We preserve the best score (which is perfect score)
                let newScore = isPerfect ? score : currentData.score;
                
                leaderboard[currentUser]['gagamba'] = { score: newScore, retakes: retakeCount };
                localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
            }

            let resultHTML = `
                <h1 class="mb-4" style="color: #004a8e;">${isPerfect ? '🏆 NAPAKAHUSAY! 🏆' : 'KAYA MO \'YAN!'}</h1>
                <div class="score-text mb-4" style="color: #004a8e;">SCORE: ${score}/${questions.length}</div>
                <div style="font-size: 2rem; color: #004a8e;" class="mb-4">Bilang ng Ulit: ${retakeCount}</div>
                <p style="font-size: 2rem;">
                    ${isPerfect 
                        ? 'Nakapasa ka sa pagsusulit na ito!' 
                        : 'Subukan muli para makuha ang perpektong score.'}
                </p>
                <div class="d-flex flex-column gap-3 align-items-center">
                    ${isPerfect 
                        ? `<button class="btn-custom btn-ready mt-4" style="background-color: #004a8e; box-shadow: 0 10px 0 #002d5a;" onclick="window.location.href='../story Halayang ube/halayangube.html'">SUSUNOD NA ARALIN ➡️</button>` 
                        : `<button class="btn-custom btn-ready mt-4" style="background-color: #004a8e; box-shadow: 0 10px 0 #002d5a;" onclick="resetQuiz()">MAGLARO MULI 🔄</button>`
                    }
                    <button class="btn-custom btn-ready mt-3" style="background-color: #e74c3c; box-shadow: 0 10px 0 #c0392b;" onclick="window.location.href='../Main.html'">HOME 🏠</button>
                </div>
            `;
            quizNode.innerHTML = resultHTML;
            document.getElementById('timer-display').classList.add('hidden');
        }
    </script>
</body>
</html>
