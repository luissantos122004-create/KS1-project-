<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mangga - Interactive Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @font-face {
            font-family: 'Alfabeto';
            src: url('Alfabeto.ttf') format('truetype');
        }
        :root {
            --primary-font: 'Alfabeto', sans-serif;
            --main-color: #FF8F00; /* Amber/Orange for Mango */
            --accent-color: #4CAF50; /* Green */
            --shadow-color: #E65100;
        }

        * { font-family: var(--primary-font); }

        body, html {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background: #fff3e0; transition: background 0.4s ease-in-out;
            user-select: none;
        }

        .wrong-flash { background: #ff4757 !important; transition: 0.2s; }

        .kitchen-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #FFF8E1; z-index: 1; transition: 0.5s;
        }
        
        #timer-display {
            position: fixed; top: 20px; right: 20px; background: #ff4757; color: white;
            padding: 10px 25px; border-radius: 50px; font-size: 2rem; font-weight: 700;
            border: 4px solid white; z-index: 100;
        }

        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.98); border: 12px solid var(--main-color);
            border-radius: 50px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            max-width: 1200px; width: 95%; text-align: center; position: relative;
            transition: 0.5s;
        }

        h1 { font-size: 3rem; color: var(--main-color); font-weight: 700; }
        
        .story-box {
            font-size: 2rem; line-height: 1.5; background: #fffde7;
            border-radius: 30px; border: 5px dashed var(--main-color);
        }

        .deped-logo { position: absolute; top: -75px; left: 40px; width: 140px; }

        .btn-audio {
            background: var(--main-color); color: white; border: none; border-radius: 50%;
            width: 70px; height: 70px; font-size: 2rem; box-shadow: 0 6px 0 var(--shadow-color);
            margin-bottom: 10px; transition: 0.2s;
        }

        .btn-custom {
            font-size: 2.2rem; padding: 15px 50px; border-radius: 100px; border: none;
            font-weight: 700; color: white; box-shadow: 0 10px 0 var(--shadow-color); cursor: pointer;
            margin: 5px;
        }
        .btn-ready { background-color: var(--main-color); }
        .btn-ready:active { transform: translateY(8px); box-shadow: 0 2px 0 var(--shadow-color); }

        .btn-choice { 
            background-color: white; color: var(--main-color); border: 4px solid var(--main-color); 
            width: 100%; margin-bottom: 12px; text-align: left; padding: 12px 30px;
            font-size: 2rem; border-radius: 30px; box-shadow: 0 8px 0 var(--main-color);
            transition: 0.2s;
        }
        .btn-choice:hover:not(:disabled) { background-color: var(--main-color); color: white; transform: translateX(10px); }

        .choice-marker { font-weight: 700; margin-right: 15px; color: #000; }
        #message { font-size: 2.2rem; margin-top: 10px; font-weight: 700; min-height: 3rem; }
        .hidden { display: none !important; }
        
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- DRAWING SECTION --- */
        #drawing-area {
            position: relative; width: 600px; height: 300px; margin: 10px auto;
            border: 4px dashed #ccc; background: #fff; touch-action: none;
            overflow: hidden; border-radius: 20px;
        }
        #trace-canvas { position: absolute; top: 0; left: 0; z-index: 2; cursor: none; }

        .draw-toolbar { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .tool-btn {
            background: white; border: 4px solid var(--main-color); border-radius: 15px;
            padding: 8px 20px; font-size: 1.2rem; cursor: pointer; transition: 0.2s;
            font-weight: 700; color: var(--main-color);
        }
        .tool-btn.active { background: var(--main-color); color: white; transform: scale(1.05); }

        .btn-submit { background-color: #2ecc71; box-shadow: 0 8px 0 #27ae60; margin-top: 20px; }
        .btn-submit:active { transform: translateY(4px); box-shadow: 0 4px 0 #27ae60; }

        #custom-cursor { 
            position: fixed; pointer-events: none; z-index: 1000; font-size: 3rem;
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
        }
        .cursor-pencil { transform: translate(-5px, -35px); } 
        .cursor-eraser { transform: translate(-25px, -25px); }

        .falling-mangga {
            position: fixed; top: -60px; font-size: 35px; z-index: 5; pointer-events: none;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="kitchen-bg"></div>
    <div id="custom-cursor" class="hidden cursor-pencil">✏️</div>
    <div id="timer-display" class="hidden">05:00</div>

    <div class="ui-wrapper">
        <div class="main-card" id="card-container">
            <img src="deped.png" class="deped-logo" alt="DepEd Logo">
            
            <div id="content-welcome">
                <h1 class="mb-5">Handa ka na ba?</h1>
                <button class="btn-custom btn-ready" onclick="showStory()">MAGSIMULA!</button>
            </div>

            <div id="content-story" class="hidden">
                <div class="d-flex justify-content-between align-items-center">
                    <h1>Basahin Natin</h1>
                    <button class="btn-audio" onclick="document.getElementById('ding').play()">🔊</button>
                </div>
                <div class="story-box p-4 mt-4 d-flex align-items-center justify-content-between text-start gap-4">
                    <div style="flex: 1;">
                        <div style="text-align: center; margin-bottom: 20px;"><strong>Mangga</strong></div>
                        <p style="text-indent: 50px; margin: 0;">
                               Mangga ang ating pambansang prutas. 
                            Hugis puso at may makinis na balat. 
                            Berde at maasim kung hilaw pa. 
                            Dilaw at matamis kung hinog na.
                            Sikat ang mangga ng Isla ng Guimaras.
                        </p>
                    </div>
                    <img src="mangga.png" alt="Mangga" style="max-width: 350px; height: auto;">
                </div>
                <button class="btn-custom btn-ready mt-5" onclick="startQuiz()">MAGPATULOY</button>
            </div>

            <div id="content-quiz" class="hidden">
                <h2 id="question-text" style="font-size: 2.5rem; font-weight: 700;" class="mb-4"></h2>
                
                <div id="drawing-container" class="hidden">
                    <div id="drawing-area">
                        <canvas id="trace-canvas" width="600" height="300"></canvas>
                    </div>
                    <div class="draw-toolbar">
                        <button id="btn-pencil" class="tool-btn active" onclick="setTool('pencil')">✏️ Lapis</button>
                        <button id="btn-eraser" class="tool-btn" onclick="setTool('eraser')">🧽 Eraser</button>
                        <button class="tool-btn" style="border-color: #ff4757; color: #ff4757;" onclick="clearCanvas()">🗑️ Ulitin</button>
                    </div>
                    <button class="btn-custom btn-submit" onclick="submitDrawing()">IPASA ANG GAWA 📄</button>
                </div>

                <div id="choices-container"></div>
                <div id="message"></div>
            </div>
        </div>
    </div>

    <audio id="ding" src="https://www.myinstants.com/media/sounds/ding-sound-effect_1.mp3"></audio>
    <audio id="buzzer" src="https://www.myinstants.com/media/sounds/spongebob-fail.mp3"></audio>

    <script>
        const STORY_ID = 'mangga';

        const questions = [
            { q: "Ano ang ating pambansang prutas?", opt: ["Duhat", "Mangga", "Rambutan", "Santol"], ans: 1 },
            { q: "Ano ang hugis ng mangga?", opt: ["Bilog", "Parisukat", "Puso", "Tatsulok"], ans: 2 },
            { q: "Ilan ang maaaring kulay ng mangga?", opt: ["Apat", "Dalawa", "Isa", "Tatlo"], ans: 1 },
            { q: "Saan matatagpuan ang sikat na mangga?", opt: ["Guimaras", "Laguna", "Quezon", "Rizal"], ans: 0 },
            { q: "Bakit kaya sikat ang Mangga ng Guimaras?", opt: ["Maasim", "Malambot", "Mapakla", "Matamis"], ans: 3 },
            { q: "Iguhit ang Mangga para manalo!", type: "draw" }
        ];

        let currentQ = 0, score = 0, retakeCount = 0, timeLeft = 300;
        let timerInterval, manggaInterval, timerStarted = false, quizStarted = false, isSaved = false;

        // Drawing variables
        let canvas, ctx, drawing = false, currentTool = 'pencil', pointsDrawn = 0, canvasInitialized = false;
        const customCursor = document.getElementById('custom-cursor');

        async function fetchInitialRetakes() {
            const userJson = localStorage.getItem('currentUser');
            if (!userJson) return;
            const user = JSON.parse(userJson);
            try {
                const response = await fetch('../get_leaderboard.php?action=user_details&school_id=' + user.school_id);
                const result = await response.json();
                if (result.success) {
                    const record = result.records.find(r => r.story_id === STORY_ID);
                    if (record) retakeCount = parseInt(record.retakes) || 0;
                }
            } catch (e) { console.error("Error fetching retakes:", e); }
        }
        fetchInitialRetakes();

        function startTimer() {
            if (timerStarted) return;
            timerStarted = true;
            document.getElementById('timer-display').classList.remove('hidden');
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    let mins = Math.floor(timeLeft / 60), secs = timeLeft % 60;
                    document.getElementById('timer-display').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                } else {
                    clearInterval(timerInterval);
                    finish();
                }
            }, 1000);
        }

        function showStory() {
            document.getElementById('ding').play();
            document.getElementById('content-welcome').classList.add('hidden');
            const story = document.getElementById('content-story');
            story.classList.remove('hidden');
            story.classList.add('fade-in');
        }

        function startQuiz() {
            quizStarted = true;
            document.getElementById('ding').play();
            document.querySelector('.kitchen-bg').style.background = '#D9E9F6';
            document.documentElement.style.setProperty('--main-color', '#0d47a1');
            document.querySelector('.main-card').style.borderColor = '#004a8e';
            document.getElementById('content-story').classList.add('hidden');
            document.getElementById('content-quiz').classList.remove('hidden');
            stopManggaRain();
            startTimer();
            loadQuestion();
        }

        /* DRAWING CORE */
        function initCanvas() {
            if (canvasInitialized) return;
            canvas = document.getElementById('trace-canvas');
            ctx = canvas.getContext('2d');
            ctx.lineCap = "round"; ctx.lineJoin = "round";
            setTool('pencil');

            const moveCursor = (e) => {
                customCursor.style.left = (e.clientX || e.pageX) + "px";
                customCursor.style.top = (e.clientY || e.pageY) + "px";
            };

            const startDraw = (e) => { drawing = true; draw(e); };
            const stopDraw = () => { drawing = false; ctx.beginPath(); };

            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', (e) => { moveCursor(e); draw(e); });
            window.addEventListener('mouseup', stopDraw);
            canvas.addEventListener('mouseenter', () => customCursor.classList.remove('hidden'));
            canvas.addEventListener('mouseleave', () => customCursor.classList.add('hidden'));
            canvasInitialized = true;
        }

        function setTool(tool) {
            currentTool = tool;
            document.getElementById('btn-pencil').classList.toggle('active', tool === 'pencil');
            document.getElementById('btn-eraser').classList.toggle('active', tool === 'eraser');
            if (tool === 'pencil') {
                ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = "#FF8F00"; ctx.lineWidth = 15;
                customCursor.innerHTML = "✏️"; customCursor.className = "cursor-pencil";
            } else {
                ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 30;
                customCursor.innerHTML = "🧽"; customCursor.className = "cursor-eraser";
            }
        }

        function draw(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.pageX) - rect.left, y = (e.clientY || e.pageY) - rect.top;
            ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
            if(currentTool === 'pencil') pointsDrawn++;
        }

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); pointsDrawn = 0; }

        function submitDrawing() {
            if (pointsDrawn < 50) {
                document.getElementById('message').innerHTML = "<span style='color:#e67e22'>Iguhit mo muna ang Mangga! 🥭</span>";
                return;
            }
            score++;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            document.getElementById('ding').play();
            document.getElementById('message').innerHTML = "<span style='color:#2ecc71'>✨ NAPAKAGALING NA GAWA! ✨</span>";
            customCursor.classList.add('hidden');
            setTimeout(finish, 1500);
        }

        function loadQuestion() {
            const data = questions[currentQ];
            document.getElementById('question-text').innerHTML = `<span>${currentQ + 1}.</span> ${data.q}`;
            const container = document.getElementById('choices-container');
            const drawContainer = document.getElementById('drawing-container');
            container.innerHTML = ""; document.getElementById('message').innerText = "";
            
            if (data.type === "draw") {
                container.classList.add('hidden'); drawContainer.classList.remove('hidden'); initCanvas();
            } else {
                container.classList.remove('hidden'); drawContainer.classList.add('hidden');
                data.opt.forEach((val, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "btn-choice";
                    btn.innerHTML = `<span class="choice-marker">${String.fromCharCode(65 + idx)}.</span> ${val}`;
                    btn.onclick = () => {
                        const allBtns = container.querySelectorAll('.btn-choice');
                        allBtns.forEach(b => b.disabled = true);
                        if(idx === data.ans) {
                            score++; confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                            document.getElementById('ding').play();
                            document.getElementById('message').innerHTML = "<span style='color:#2ecc71'>⭐ TAMA! ⭐</span>";
                        } else {
                            document.body.classList.add('wrong-flash');
                            setTimeout(() => document.body.classList.remove('wrong-flash'), 400);
                            document.getElementById('buzzer').play(); btn.classList.add('shake');
                            document.getElementById('message').innerHTML = "<span style='color:#e74c3c'>❌ Subukan Muli! ❌</span>";
                        }
                        setTimeout(() => { currentQ++; if(currentQ < questions.length) loadQuestion(); else finish(); }, 1500);
                    };
                    container.appendChild(btn);
                });
            }
        }

        async function finish() {
            clearInterval(timerInterval);
            document.getElementById('timer-display').classList.add('hidden');
            const isPerfect = (score === questions.length);
            if (!isPerfect) retakeCount++;

            const userJson = localStorage.getItem('currentUser');
            if(userJson) {
                const user = JSON.parse(userJson);
                await fetch('../save_progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ school_id: user.school_id, story_id: STORY_ID, is_perfect: isPerfect })
                });
                isSaved = true;
            }

            if (isPerfect) {
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, ticks: 400 });
                setTimeout(() => { window.location.href = '../story Niyog/Niyog.html'; }, 2000);
            }
            
            document.getElementById('content-quiz').innerHTML = `
                <h1 class="mb-4">${isPerfect ? '🏆 NAPAKAHUSAY! 🏆' : 'KAYA MO YAN!'}</h1>
                <div style="font-size: 4rem; color: #ff9800; font-weight: 700;" class="mb-4">SCORE: ${score}/${questions.length}</div>
                <div style="font-size: 2rem; color: #0d47a1;" class="mb-4">Bilang ng Ulit: ${retakeCount}</div>
                <div class="d-flex flex-column gap-2 align-items-center">
                    ${isPerfect ? '' : `<button class="btn-custom btn-ready mt-2" onclick="resetQuiz()">MAGLARO MULI 🔄</button>`}
                    <button class="btn-custom btn-ready mt-2" style="background-color: #6c757d; box-shadow: 0 10px 0 #495057;" onclick="goHome()">HOME 🏠</button>
                </div>
            `;
        }

        function resetQuiz() { location.reload(); }

        function goHome() { window.location.href = '../Main.html'; }

        function startManggaRain() {
            manggaInterval = setInterval(() => {
                const m = document.createElement('div');
                m.classList.add('falling-mangga'); m.innerText = '🥭';
                m.style.left = Math.random() * 95 + 'vw';
                const dur = Math.random() * 3 + 4;
                m.style.animation = `fall ${dur}s linear`;
                document.body.appendChild(m);
                setTimeout(() => m.remove(), dur * 1000);
            }, 800);
        }

        function stopManggaRain() { clearInterval(manggaInterval); document.querySelectorAll('.falling-mangga').forEach(el => el.remove()); }
        startManggaRain();
    </script>
</body>
</html>
