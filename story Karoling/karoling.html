<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karoling Interactive Quiz - Blue Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @font-face {
            font-family: 'Alfabeto';
            src: url('Alfabeto.ttf') format('truetype');
        }
        :root {
            --primary-font: 'Alfabeto', cursive, sans-serif;
            --theme-blue-dark: #2980b9;
            --theme-blue-light: #e1f5fe;
            --theme-blue-accent: #3498db;
            --theme-green: #27ae60;
            --theme-red: #c0392b;
        }

        body, html {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            font-family: var(--primary-font);
            background: #0b1d3a; transition: background 0.4s ease-in-out;
            user-select: none;
        }

        /* --- REALISTIC CLOUDS --- */
        .cloud { 
            position: absolute; background: #fff; border-radius: 50%; 
            opacity: 0.8; z-index: 1; box-shadow: 40px 20px 40px 10px #fff; filter: blur(1px); 
        }
        .cloud::after, .cloud::before { 
            content: ''; position: absolute; background: #fff; border-radius: 50%; 
        }
        .cloud::after { width: 100px; height: 100px; top: -50px; left: 40px; box-shadow: 0 0 30px 5px #fff; }
        .cloud::before { width: 120px; height: 120px; top: -70px; left: 80px; box-shadow: 0 0 30px 5px #fff; }

        .c1 { width: 250px; height: 80px; top: 10%; left: -350px; animation: moveCloud 45s linear infinite; transform: scale(1.2); }
        .c2 { width: 200px; height: 60px; top: 25%; left: -300px; animation: moveCloud 60s linear infinite 10s; opacity: 0.5; transform: scale(0.8); }

        @keyframes moveCloud {
            from { left: -350px; }
            to { left: 110%; }
        }

        /* --- STAR TRANSITION --- */
        #transition-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; display: flex;
            justify-content: center; align-items: center; overflow: hidden;
        }
        .trans-star {
            position: absolute; font-size: 5rem; color: #f1c40f;
            transform: scale(0); filter: drop-shadow(0 0 20px rgba(241, 196, 15, 0.8));
        }
        @keyframes starFill {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(2) rotate(180deg); opacity: 1; }
            100% { transform: scale(4) rotate(360deg); opacity: 0; }
        }

        /* --- BACKGROUNDS --- */
        .winter-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            z-index: 1; transition: opacity 0.8s ease;
        }
        .snow-container { position: absolute; width: 100%; height: 100%; z-index: 2; }
        .snowflake {
            position: absolute; top: -50px; color: rgba(255, 255, 255, 0.8);
            font-size: 1.5rem; animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh); opacity: 0; }
        }

        /* --- UI COMPONENTS --- */
        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .main-card {
            background: #f0f7ff; border: 12px solid var(--theme-blue-dark);
            border-radius: 50px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 900px; width: 95%; text-align: center; position: relative;
        }

        /* Small Welcome Image Style */
        .karoling-img {
            max-width: 250px; width: 100%; height: auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            animation: welcomeBounce 3s ease-in-out infinite;
        }
        @keyframes welcomeBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.03); }
        }

        .deped-logo { position: absolute; top: -75px; left: 40px; width: 130px; }
        .story-box {
            font-size: 2rem; line-height: 1.5; background: var(--theme-blue-light);
            border-radius: 30px; border: 5px dashed var(--theme-blue-accent);
        }

        .btn-custom {
            font-size: 2.2rem; padding: 15px 50px; border-radius: 100px; border: none;
            font-weight: 700; color: white; cursor: pointer; transition: 0.2s;
        }
        .btn-ready { background: var(--theme-blue-accent); box-shadow: 0 8px 0 #2471a3; }
        .btn-ready:active { transform: translateY(5px); box-shadow: 0 2px 0 #2471a3; }

        .btn-choice { 
            background: white; color: var(--theme-blue-dark); border: 4px solid var(--theme-blue-dark); 
            width: 100%; margin-bottom: 12px; padding: 15px; font-size: 1.6rem; border-radius: 25px; 
            box-shadow: 0 6px 0 var(--theme-blue-dark); transition: 0.2s; text-align: left;
        }
        .btn-choice:hover:not(:disabled) { background: var(--theme-blue-dark); color: white; transform: translateX(5px); }

        .hidden { display: none !important; }
        #timer-display {
            position: fixed; top: 20px; right: 20px; background: #ff4757; color: white;
            padding: 10px 25px; border-radius: 50px; font-size: 2rem; font-weight: 700;
            border: 4px solid white; z-index: 100;
        }

        .white-bg-active { background: #ebf5fb !important; }
        .hide-winter { opacity: 0 !important; }
    </style>
</head>
<body>

    <div id="transition-overlay"></div>

    <div class="winter-container" id="winter-bg">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="snow-container" id="snow-box"></div>
    </div>

    <div id="timer-display" class="hidden">05:00</div>

    <div class="ui-wrapper">
        <div class="main-card" id="card-container">
            <img src="deped.png" class="deped-logo" alt="DepEd">
            
            <div id="content-welcome">
                <h1 class="mb-4">Handa Ka Na Ba Mag-Karoling? 🎵</h1>
                <div class="mb-4">
                    <img src="karoling.png" class="karoling-img" alt="Karoling Kids">
                </div>
                <button class="btn-custom btn-ready" onclick="triggerWowForStory()">MAGSIMULA!</button>
            </div>

            <div id="content-story" class="hidden">
                <h1>Basahin Natin 📖</h1>
                <div class="story-box p-4 text-start mt-4">
                    Limang araw na lang Pasko na. Nagkaroling kami nina Karla, Karmi, at Kaloy. Bawat bahay ay kinantahan namin. Dala namin ang lata, niyuping tansan, tinidor, at kutsara. Nakaipon kami ng sandaang barya.
                </div>
                <button class="btn-custom btn-ready mt-5" onclick="triggerStarTransition()">MAGPATULOY 🚀</button>
            </div>

            <div id="content-quiz" class="hidden">
                <h2 id="question-text" class="mb-4" style="color: #2c3e50; font-weight: 700;"></h2>
                <div id="choices-container"></div>
                <div id="message" class="mt-3 fw-bold fs-3"></div>
            </div>
        </div>
    </div>

    <audio id="ding" src="https://www.myinstants.com/media/sounds/ding-sound-effect_1.mp3"></audio>
    <audio id="buzzer" src="https://www.myinstants.com/media/sounds/spongebob-fail.mp3"></audio>

    <script>
        const questions = [
            { q: "Ano ang ginawa ng mga bata?", opt: ["nagkaroling", "nagluto", "namasyal"], ans: 0 },
            { q: "Ilang araw na lang bago magpasko?", opt: ["2", "3", "5"], ans: 2 },
            { q: "Saan sila kumakanta?", opt: ["bawat bahay", "dagat", "ilog"], ans: 0 },
            { q: "Magkanong barya ang naipon nila?", opt: ["limampu", "sampu", "sandaan"], ans: 2 },
            { q: "Kung apat sila, tigmagkano ang bawat isa?", opt: ["20 barya", "25 barya", "30 barya"], ans: 1 }
        ];

        let currentQ = 0;
        let score = 0;
        const STORY_ID = 'karoling';
        let retakeCount = 0;
        let timeLeft = 300;
        let timerInterval;
        let timerStarted = false;
        let quizStarted = false;
        let isSaved = false;

        function createSnowflake() {
            const winterBg = document.getElementById('winter-bg');
            if (!winterBg || winterBg.classList.contains('hide-winter')) return;
            const snowBox = document.getElementById('snow-box');
            const snow = document.createElement('div');
            snow.className = 'snowflake';
            const icons = ['❄️', '🎵', '⭐'];
            snow.innerHTML = icons[Math.floor(Math.random()*icons.length)];
            snow.style.left = Math.random() * 100 + '%';
            snow.style.animationDuration = (Math.random() * 3 + 4) + 's';
            snowBox.appendChild(snow);
            setTimeout(() => snow.remove(), 7000);
        }
        setInterval(createSnowflake, 500);

        async function fetchInitialRetakes() {
            const userJson = localStorage.getItem('currentUser');
            if (!userJson) return;
            const user = JSON.parse(userJson);
            try {
                const response = await fetch('../get_leaderboard.php?action=user_details&school_id=' + user.school_id);
                const result = await response.json();
                if (result.success) {
                    const record = result.records.find(r => r.story_id === STORY_ID);
                    if (record) retakeCount = parseInt(record.retakes) || 0;
                }
            } catch (e) { console.error("Error fetching retakes:", e); }
        }
        fetchInitialRetakes();

        function triggerWowForStory() {
            document.getElementById('ding').play();
            document.getElementById('winter-bg').classList.add('hide-winter');
            document.body.classList.add('white-bg-active');
            document.getElementById('content-welcome').classList.add('hidden');
            document.getElementById('content-story').classList.remove('hidden');
        }

        function triggerStarTransition() {
            const overlay = document.getElementById('transition-overlay');
            quizStarted = true;
            document.getElementById('ding').play();
            document.getElementById('timer-display').classList.remove('hidden');
            for (let i = 0; i < 10; i++) {
                const s = document.createElement('div');
                s.className = 'trans-star'; s.innerHTML = '⭐';
                s.style.left = Math.random() * 90 + '%';
                s.style.top = Math.random() * 90 + '%';
                s.style.animation = `starFill 1.2s forwards`;
                overlay.appendChild(s);
            }
            setTimeout(() => {
                document.getElementById('content-story').classList.add('hidden');
                document.getElementById('content-quiz').classList.remove('hidden');
                if(!timerStarted) { startTimer(); timerStarted = true; }
                loadQuestion();
            }, 800);
            setTimeout(() => overlay.innerHTML = '', 2000);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    let mins = Math.floor(timeLeft / 60);
                    let secs = timeLeft % 60;
                    document.getElementById('timer-display').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                } else {
                    clearInterval(timerInterval);
                    finish();
                }
            }, 1000);
        }

        function loadQuestion() {
            const data = questions[currentQ];
            document.getElementById('question-text').innerText = `${currentQ + 1}. ${data.q}`;
            const container = document.getElementById('choices-container');
            container.innerHTML = "";
            document.getElementById('message').innerText = "";

            data.opt.forEach((val, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-choice";
                btn.innerText = `${String.fromCharCode(65+idx)}. ${val}`;
                btn.onclick = () => {
                    document.querySelectorAll('#choices-container .btn-choice').forEach(b => b.disabled = true);
                    if(idx === data.ans) {
                        score++;
                        confetti();
                        document.getElementById('ding').play();
                        document.getElementById('message').innerHTML = "<span style='color:green'>TAMA! ⭐</span>";
                    } else {
                        document.getElementById('buzzer').play();
                        document.getElementById('message').innerHTML = "<span style='color:red'>MALI! ❌</span>";
                    }
                    setTimeout(() => {
                        currentQ++;
                        if(currentQ < questions.length) loadQuestion();
                        else finish();
                    }, 1500);
                };
                container.appendChild(btn);
            });
        }

        async function finish() {
            clearInterval(timerInterval);
            document.getElementById('timer-display').classList.add('hidden');

            const isPerfect = (score === questions.length);
            if (!isPerfect) {
                retakeCount++;
            }

            const userJson = localStorage.getItem('currentUser');
            if (userJson) {
                const user = JSON.parse(userJson);
                try {
                    await fetch('../save_progress.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            school_id: user.school_id,
                            story_id: STORY_ID,
                            is_perfect: isPerfect
                        })
                    });
                    isSaved = true;
                } catch (e) { 
                    console.error("Error saving result:", e); 
                    alert("Hindi ma-save ang iyong progress. Pakisuri ang iyong koneksyon.");
                }
            }

            if (isPerfect) {
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
                setTimeout(() => {
                    window.location.href = '../Main.html?completed=' + encodeURIComponent(STORY_ID);
                }, 2500);
            }

            const quiz = document.getElementById('content-quiz');
            quiz.innerHTML = `
                <h1 style="font-size: 4rem;">${isPerfect ? '🏆 NAPAKAHUSAY! 🏆' : 'Kaya Mo \'Yan!'}</h1>
                <div style="font-size: 5rem; color: #f39c12; font-weight: 800; margin: 20px 0;">${score} / ${questions.length}</div>
                <div style="font-size: 2rem; color: var(--theme-blue-dark);" class="mb-3">Bilang ng Ulit: ${retakeCount}</div>
                <p style="font-size: 1.8rem;">
                    ${isPerfect 
                        ? 'Magaling! Inaayos na ang susunod na kuwento...' 
                        : 'Subukan muli para makuha ang perpektong score.'}
                </p>
                <div class="d-flex flex-column gap-3 align-items-center mt-3">
                    ${isPerfect 
                        ? `<p class="fs-4">Naglo-load ng susunod na aralin...</p>` 
                        : `<button class="btn-custom btn-ready" onclick="resetQuiz()">ULITIN 🔄</button>`
                    }
                    <button class="btn-custom btn-ready" style="background: #6c757d; box-shadow: 0 8px 0 #495057;" onclick="goHome()">HOME 🏠</button>
                </div>
            `;
        }

        function resetQuiz() {
            currentQ = 0;
            score = 0;
            isSaved = false;
            quizStarted = false;
            timeLeft = 300;
            clearInterval(timerInterval);
            timerStarted = false;
            document.getElementById('timer-display').classList.add('hidden');
            document.getElementById('winter-bg').classList.remove('hide-winter');
            document.body.classList.remove('white-bg-active');
            document.getElementById('content-quiz').classList.add('hidden');
            document.getElementById('content-welcome').classList.remove('hidden');
            fetchInitialRetakes();
        }

        function goHome() {
            const leave = () => { window.location.href = '../Main.html'; };
            if (quizStarted && !isSaved) {
                if (confirm("Hindi pa tapos ang quiz. Kung aalis ka, hindi ito mase-save. Sigurado ka ba?")) {
                    leave();
                }
            } else {
                leave();
            }
        }

        window.onbeforeunload = function() {
            if (quizStarted && !isSaved) {
                return "Hindi pa tapos ang quiz. Kung aalis ka, hindi ito mase-save. Sigurado ka ba?";
            }
        };
    </script>
</body>
</html>
