<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gumamela Interactive Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @font-face {
            font-family: 'Alfabeto';
            src: url('Alfabeto.ttf') format('truetype');
            font-weight: normal;
        }

        :root {
            --primary-font: 'Alfabeto', 'Fredoka', 'Comic Sans MS', cursive, sans-serif;
            --main-theme: #004a8e; 
            --accent-pink: #d63384;
        }

        body, html {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            font-family: var(--primary-font);
            background: #418ace; transition: background 0.4s ease-in-out;
            user-select: none;
        }

        .wrong-flash { background: #004a8e !important; transition: 0.2s; }

        #transition-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; display: flex;
            justify-content: center; align-items: center; overflow: hidden;
        }

        .trans-bubble {
            position: absolute; 
            background-image: url('gumamela2.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transform: scale(3);
        }

        @keyframes bubbleFill {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .blue-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #418ace 0%, #418ace 50%, #004a8e 100%);
            z-index: 1; transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .particle-container { position: absolute; width: 100%; height: 100%; z-index: 2; overflow: hidden; }
        
        .particle {
            position: absolute; bottom: 100px; 
            background-image: url('gumamela2.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.7;
            animation: rise linear infinite;
        }

        @keyframes rise {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-120vh) translateX(-30px) rotate(360deg); opacity: 0; }
        }

        .floor {
            position: absolute; bottom: 0; width: 100%; height: 100px;
            background: #418ace; border-top: 8px solid #ffffff; z-index: 5;
        }

        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.98); 
            border: 12px solid var(--main-theme);
            border-radius: 50px; padding: 80px 40px 40px 40px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 1000px; width: 95%; text-align: center; position: relative;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .deped-logo { 
            position: absolute; 
            top: -65px; 
            left: 40px;
            width: 130px; 
            z-index: 100;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .zoom-out-wow { transform: scale(0) rotate(10deg); opacity: 0; }
        .bounce-in-wow { animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .white-bg-active { background: #e0f2ff !important; }
        .hide-bg { opacity: 0 !important; transform: scale(1.1); pointer-events: none; }

        h1 { font-size: 4rem; color: var(--main-theme); font-weight: 700; }
        
        .story-box {
            font-size: 1.8rem; line-height: 1.6; background: #f0f8ff;
            border-radius: 30px; border: 5px dashed var(--main-theme); position: relative;
        }
        
        #timer-display {
            position: fixed; top: 20px; right: 20px; background: #ff4757; color: white;
            padding: 10px 25px; border-radius: 50px; font-size: 2rem; font-weight: 700;
            border: 4px solid white; z-index: 100;
        }

        .btn-custom {
            font-size: 2.5rem; padding: 20px 60px; border-radius: 100px; border: none;
            font-weight: 700; color: white; box-shadow: 0 10px 0 #002d5a; cursor: pointer;
            font-family: var(--primary-font); margin: 5px;
        }
        .btn-ready { background-color: var(--main-theme); }
        .btn-ready:active { transform: translateY(8px); box-shadow: 0 2px 0 #002d5a; }
        
        .btn-home { background-color: #28a745 !important; box-shadow: 0 10px 0 #1e7e34 !important; }
        .btn-home:active { transform: translateY(8px); box-shadow: 0 2px 0 #1e7e34 !important; }

        .btn-audio {
            background: #418ace; color: white; border: none; border-radius: 50%;
            width: 70px; height: 70px; font-size: 2rem; box-shadow: 0 6px 0 #002d5a;
            margin-bottom: 10px; transition: 0.2s;
        }

        .btn-choice { 
            background-color: white; color: var(--main-theme); border: 4px solid var(--main-theme); 
            width: 100%; margin-bottom: 12px; text-align: left; padding: 15px 40px;
            font-size: 2.5rem; border-radius: 30px; box-shadow: 0 8px 0 var(--main-theme);
            transition: transform 0.2s; font-family: var(--primary-font);
        }
        
        .choice-marker {
            font-weight: 700;
            margin-right: 15px;
            color: #000000;
        }

        .btn-choice:hover:not(:disabled) { background-color: var(--main-theme); color: white; transform: translateX(10px); }

        #message { font-size: 2.5rem; margin-top: 5px; min-height: 3.5rem; font-weight: 700; }
        .hidden { display: none !important; }

        .score-text { font-size: 5rem; color: #ff9f43; font-weight: 700; }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div id="transition-overlay"></div>

    <div class="blue-container" id="main-bg">
        <div class="particle-container" id="particle-box"></div>
        <div class="floor"></div>
    </div>

    <div id="timer-display" class="hidden">05:00</div>

    <div class="ui-wrapper">
        <div class="main-card" id="card-container">
            <img src="deped.png" class="deped-logo" alt="DepEd Logo">
            
            <div id="content-welcome">
                <h1 class="mb-5">Handa ka na ba?</h1>
                <button class="btn-custom btn-ready" onclick="triggerWowForStory()">MAGSIMULA!</button>
            </div>

            <div id="content-story" class="hidden">
                <div class="d-flex justify-content-between align-items-center">
                    <h1>Basahin Natin</h1>
                    <button class="btn-audio" onclick="playVoice()">🔊</button>
                </div>
                
                <div class="story-box p-4 mt-4 d-flex align-items-center justify-content-between gap-4">
                    <div class="story-paragraph">
                        <p style="text-indent: 2rem; text-align: justify;">Pumitas ako ng mga Gumamela. Limang pula, tatlong dilaw, at dalawang puti ang aking pinitas. Ilalagay ko sa altar ang dilaw at puti. Didikdikin ko ang mga pula. Lalagyan ng kaunting sabon para gawing palobo.</p>
                    </div>
                    <img src="gumamela2.png" alt="Gumamela Image" class="img-fluid rounded" style="max-height: 250px; border: 4px solid var(--main-theme); border-radius: 20px;">
                </div>
                <button class="btn-custom btn-ready mt-5" onclick="triggerBubbleTransition()">MAGPATULOY</button>
            </div>

            <div id="content-quiz" class="hidden">
                <div class="mb-4">
                    <h2 id="question-text" style="font-size: 3rem; font-weight: 700;"></h2>
                </div>
                
                <div id="choices-container"></div>
                <div id="message" class="fw-bold"></div>
            </div>
        </div>
    </div>

    <audio id="ding" src="https://www.myinstants.com/media/sounds/ding-sound-effect_1.mp3"></audio>
    <audio id="buzzer" src="https://www.myinstants.com/media/sounds/spongebob-fail.mp3"></audio>
    <audio id="storyVoice" src="gumamelavoice.m4a"></audio>

    <script>
        const STORY_ID = 'gumamela';

        async function fetchInitialRetakes() {
            const userJson = localStorage.getItem('currentUser');
            if (!userJson) return;
            const user = JSON.parse(userJson);
            try {
                const response = await fetch('../get_leaderboard.php?action=user_details&school_id=' + user.school_id);
                const result = await response.json();
                if (result.success) {
                    const record = result.records.find(r => r.story_id === STORY_ID);
                    if (record) retakeCount = parseInt(record.retakes) || 0;
                }
            } catch (e) { console.error("Error fetching retakes:", e); }
        }
        fetchInitialRetakes();

        const questions = [
            { q: "Ano ang Gumamela?", opt: ["Bulaklak", "Dahon", "Hayop", "Puno"], ans: 0 },
            { q: "Ilan lahat ang mga Gumamela sa kuwento?", opt: ["Lima", "Pito", "Walo", "Sampu"], ans: 3 },
            { q: "Ilang Gumamela ang iiaalay sa altar?", opt: ["Lima", "Dalawa", "Tatlo", "Lima"], ans: 3 },
            { q: "Ano ang gagawin niya sa pulang Gumamela", opt: ["Kakainin", "Palobo", "Pantanim", "Wala"], ans: 1 },
            { q: "Paano magiging palobo ang Gumamela?", opt: ["Didikdikin", "ilalaga", "itatanim", "kakatasin"], ans: 0 }
        ];

        let currentQ = 0;
        let score = 0;
        let timeLeft = 300; 
        let timerStarted = false;
        let retakeCount = 0;
        let timerInterval;
        let quizStarted = false;
        let isSaved = false;
        let transitionTriggered = false;

        function showScreen(id) {
            document.body.style.pointerEvents = 'none';
            setTimeout(() => {
                document.querySelectorAll('.main-card > div').forEach(div => div.classList.add('hidden'));
                document.getElementById(`content-${id}`).classList.remove('hidden');
                document.body.style.pointerEvents = 'auto';
            }, 1000);
        }

        function triggerBubbleTransition() {
            if (transitionTriggered) return;
            transitionTriggered = true;
            const overlay = document.getElementById('transition-overlay');
            document.getElementById('ding').play();
            for (let i = 0; i < 15; i++) {
                const b = document.createElement('div');
                b.className = 'trans-bubble';
                const size = Math.random() * 300 + 200;
                b.style.width = size + 'px';
                b.style.height = size + 'px';
                b.style.left = Math.random() * 100 + '%';
                b.style.top = Math.random() * 100 + '%';
                b.style.animation = `bubbleFill 1.2s ease-in-out forwards`;
                overlay.appendChild(b);
            }
            setTimeout(() => { startQuiz(); overlay.innerHTML = ''; }, 1000);
        }

        function shootConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#004a8e', '#418ace', '#d63384', '#ffffff'] 
            });
        }

        function triggerWrongEffect() {
            document.body.classList.add('wrong-flash');
            setTimeout(() => document.body.classList.remove('wrong-flash'), 400);
        }

        function createParticle() {
            const container = document.getElementById('particle-box');
            const b = document.createElement('div');
            b.className = 'particle';
            const size = Math.random() * 60 + 40 + 'px';
            b.style.width = size; b.style.height = size;
            b.style.left = Math.random() * 100 + '%';
            b.style.animationDuration = (Math.random() * 5 + 5) + 's';
            container.appendChild(b);
            setTimeout(() => b.remove(), 10000);
        }
        setInterval(createParticle, 800);

        function triggerWowForStory() {
            document.getElementById('ding').play();
            const card = document.getElementById('card-container');
            card.classList.add('zoom-out-wow');
            document.getElementById('main-bg').classList.add('hide-bg');
            document.body.classList.add('white-bg-active');
            showScreen('story');
            setTimeout(() => {
                card.classList.remove('zoom-out-wow');
                card.classList.add('bounce-in-wow');
            }, 1000);
        }

        function startQuiz() {
            quizStarted = true;
            document.getElementById('timer-display').classList.remove('hidden');
            showScreen('quiz');
            if(!timerStarted) { startTimer(); timerStarted = true; }
            loadQuestion();
        }

        function resetQuiz() {
            currentQ = 0;
            score = 0;
            isSaved = false;
            quizStarted = false;
            transitionTriggered = false;
            timeLeft = 300;
            clearInterval(timerInterval);
            
            document.getElementById('content-quiz').innerHTML = `
                <div class="mb-4"><h2 id="question-text" style="font-size: 2.8rem; font-weight: 700;"></h2></div>
                <div id="choices-container"></div><div id="message" class="fw-bold"></div>
            `;
            timerStarted = false;

            document.getElementById('content-quiz').classList.add('hidden');
            document.getElementById('content-welcome').classList.remove('hidden');
            document.getElementById('card-container').classList.remove('zoom-out-wow', 'bounce-in-wow');
            document.getElementById('main-bg').classList.remove('hide-bg');
            document.body.classList.remove('white-bg-active');
            document.getElementById('timer-display').classList.add('hidden');
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    let mins = Math.floor(timeLeft / 60);
                    let secs = timeLeft % 60;
                    document.getElementById('timer-display').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                } else {
                    clearInterval(timerInterval);
                    finish();
                }
            }, 1000);
        }

        function loadQuestion() {
            const data = questions[currentQ];
            document.getElementById('question-text').innerHTML = `<span style="color:#000000">${currentQ + 1}.</span> ${data.q}`;
            const container = document.getElementById('choices-container');
            container.innerHTML = "";
            document.getElementById('message').innerText = "";
            
            data.opt.forEach((val, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-choice";
                const letter = String.fromCharCode(65 + idx);
                btn.innerHTML = `<span class="choice-marker">${letter}.</span> ${val}`;
                
                btn.onclick = () => {
                    if(idx === data.ans) {
                        score++;
                        shootConfetti();
                        document.getElementById('ding').play();
                        document.getElementById('message').innerHTML = "<span style='color:#2ecc71'>⭐ TAMA! ⭐</span>";
                    } else {
                        triggerWrongEffect();
                        document.getElementById('buzzer').currentTime = 0;
                        document.getElementById('buzzer').play();
                        btn.classList.add('shake');
                        document.getElementById('message').innerHTML = "<span style='color:#e74c3c'>❌ Mali, Subukan Muli! ❌</span>";
                    }
                    const allBtns = container.querySelectorAll('.btn-choice');
                    allBtns.forEach(b => b.disabled = true);
                    nextQuestion();
                };
                container.appendChild(btn);
            });
        }

        function nextQuestion() {
            setTimeout(() => {
                currentQ++;
                if(currentQ < questions.length) loadQuestion();
                else finish();
            }, 1000);
        }

        function playVoice() {
            const v = document.getElementById('storyVoice');
            if (v && v.src) {
                v.currentTime = 0;
                v.play().catch(e => console.error("Audio play failed:", e));
            }
        }

        async function finish() {
            const quizNode = document.getElementById('content-quiz');
            const isPerfect = (score === questions.length);
            if(!isPerfect) retakeCount++;

            const userJson = localStorage.getItem('currentUser');
            if(userJson) {
                const user = JSON.parse(userJson);
                await fetch('../save_progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        school_id: user.school_id,
                        story_id: STORY_ID,
                        is_perfect: isPerfect
                    })
                }).catch(e => console.error("Error saving result:", e));
                isSaved = true;
            }

            if(isPerfect) {
                shootConfetti();
                setTimeout(() => {
                    window.location.href = '../Main.html?completed=' + encodeURIComponent(STORY_ID);
                }, 2000);
            }

            let resultHTML = `
                <h1 class="mb-4">${isPerfect ? '🏆 NAPAKAHUSAY! 🏆' : 'KAYA MO \'YAN!'}</h1>
                <div style="font-size: 5rem; color: #ff9800; font-weight: 700;" class="mb-4">${score} / ${questions.length}</div>
                <div style="font-size: 2rem; color: #0d47a1;" class="mb-4">Bilang ng Ulit: ${retakeCount}</div>
                <p style="font-size: 2rem;">
                    ${isPerfect 
                        ? 'Handa ka na para sa susunod na aralin!' 
                        : 'Subukan muli para makuha ang perpektong score.'}
                </p>
                <div class="d-flex flex-column gap-3 align-items-center">
                    ${isPerfect 
                        ? `<p style="font-size: 1.5rem;">Naglo-load ng susunod na aralin...</p>` 
                        : `<button class="btn-custom btn-ready mt-4" onclick="setTimeout(resetQuiz, 1000)">ULITIN 🔄</button>`
                    }
                    <button class="btn-custom btn-home mt-3" onclick="setTimeout(goHome, 1000)">HOME 🏠</button>
                </div>
            `;

            document.body.style.pointerEvents = 'none';
            setTimeout(() => {
                document.querySelectorAll('.main-card > div').forEach(div => div.classList.add('hidden'));
                quizNode.classList.remove('hidden');
                quizNode.innerHTML = resultHTML;
                document.body.style.pointerEvents = 'auto';
            }, 1000);

            document.getElementById('timer-display').classList.add('hidden');
        }

        function goHome() {
            const leave = () => { window.location.href = '../Main.html'; };
            if(quizStarted && !isSaved) {
                if(confirm("Maaring hindi masave ang iyong quiz. Sigurado ka ba?")) {
                    setTimeout(leave, 1000);
                }
            } else {
                setTimeout(leave, 1000);
            }
        }

        window.onbeforeunload = function() {
            if(quizStarted && !isSaved) {
                return "Maaring hindi masave ang iyong quiz. Sigurado ka ba?";
            }
        };
    </script>
</body>
</html>
