<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalabaw Interactive Quiz - DepEd Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @font-face {
            font-family: 'Alfabeto';
            src: url('Alfabeto.ttf') format('truetype');
        }
        :root { 
            --primary-font: 'Alfabeto', 'Fredoka', cursive; 
            --deped-blue: #004a99; /* Standard DepEd Blue */
        }
        body, html {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            font-family: var(--primary-font);
            background: #2d6a4f; transition: background 0.5s ease;
            user-select: none;
        }
        .wrong-flash { background: #ff4757 !important; transition: 0.2s; }
        
        /* Farm Background Elements */
        .farm-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #aaccff 0%, #99d98c 70%, #52b788 100%);
            z-index: 1; transition: opacity 0.5s ease;
        }
        .field {
            position: absolute; bottom: 0; width: 100%; height: 180px;
            background-color: #74c69d;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 10c1 5-2 10-5 15s-5 10-5 15M45 15c2 4-1 8-3 12s-4 8-4 12' stroke='%2340916c' stroke-width='2' fill='none'/%3E%3C/svg%3E");
            border-top: 8px solid #40916c; z-index: 5;
        }
        .bottom-kalabaw {
            position: fixed; bottom: 20px; right: 20px; width: 280px; z-index: 6;
            filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.2));
            animation: graze 5s ease-in-out infinite;
        }
        @keyframes graze {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        /* UI Wrapper */
        .ui-wrapper { position: relative; z-index: 10; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* The Main Card - Will change to blue border later */
        .main-card {
            background: rgba(255, 255, 255, 0.98); 
            border: 12px solid #1b4332; /* Initial Green Border */
            border-radius: 50px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            max-width: 900px; width: 95%; text-align: center;
            transition: border-color 0.5s ease;
        }

        /* Quiz Blue Theme Classes */
        .quiz-mode-bg { background: #ffffff !important; }
        .quiz-mode-card { border-color: var(--deped-blue) !important; }
        .blue-text { color: var(--deped-blue) !important; }

        .story-box { font-size: 16pt; line-height: 1.6; background: #f1f8e9; border-radius: 30px; border: 5px dashed #2d6a4f; }
        
        .btn-custom { font-size: 2.2rem; padding: 15px 50px; border-radius: 100px; border: none; font-weight: 700; color: white; box-shadow: 0 10px 0 #1b4332; cursor: pointer; }
        .btn-ready { background-color: #40916c; }
        .btn-blue { background-color: var(--deped-blue); box-shadow: 0 10px 0 #003366; }

        .btn-choice { 
            background-color: white; color: var(--deped-blue); border: 4px solid var(--deped-blue); 
            width: 100%; margin-bottom: 12px; text-align: left; padding: 15px 30px;
            font-size: 2rem; border-radius: 30px; box-shadow: 0 8px 0 var(--deped-blue); transition: 0.2s;
        }
        .btn-choice:hover { background-color: #e3f2fd; transform: scale(1.02); }
        
        #timer-display {
            position: fixed; top: 20px; right: 20px; background: #ff4757; color: white;
            padding: 10px 25px; border-radius: 50px; font-size: 1.8rem; z-index: 100; border: 4px solid white;
        }
        .hidden { display: none !important; }
        #drawing-area { position: relative; width: 100%; max-width: 500px; height: 300px; margin: 10px auto; border: 4px dashed #ccc; background: #fff; border-radius: 20px; }
        canvas { position: absolute; top: 0; left: 0; z-index: 2; cursor: crosshair; }
        #outline-img { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; opacity: 0.1; }
    </style>
</head>
<body>

    <div id="bg-farm" class="farm-container">
        <div class="field"></div>
        <img src="kalabaw.png" class="bottom-kalabaw" alt="Kalabaw">
    </div>

    <div id="timer-display" class="hidden">05:00</div>

    <div class="ui-wrapper">
        <div class="main-card" id="card-container">
            <div id="content-welcome">
                <h1 style="font-size: 3.5rem; color: #1b4332;">Ang Kwento ng Kalabaw</h1>
                <p style="font-size: 1.5rem;">Handa ka na bang matuto tungkol sa ating pambansang hayop?</p>
                <button class="btn-custom btn-ready mt-4" onclick="showStory()">MAGSIMULA!</button>
            </div>

            <div id="content-story" class="hidden">
                <h1 style="color: #1b4332;">Basahin Natin</h1>
                <div class="story-box p-4 text-start mt-3">
                    <p class="mb-0">
                        Kalabaw ang pambansang hayop. Masisipag ang mga kalabaw. Katulong ito ng mga magsasaka. Nag-aararo mainit man o maulan. Gayahin natin ang kasipagan ng kalabaw.
                    </p>
                </div>
                <button class="btn-custom btn-ready mt-4" onclick="startQuiz()">MAGPATULOY</button>
            </div>

            <div id="content-quiz" class="hidden">
                <h2 id="question-text" class="blue-text" style="font-size: 2.5rem; margin-bottom: 20px;"></h2>
                <div id="choices-container"></div>
                
                <div id="drawing-container" class="hidden">
                    <div id="drawing-area">
                        <img src="kalabaw.png" id="outline-img">
                        <canvas id="trace-canvas" width="500" height="300"></canvas>
                    </div>
                    <button class="btn-custom btn-blue mt-3" onclick="submitDrawing()">IPASA ANG GAWA 📄</button>
                </div>

                <div id="message" class="mt-3" style="font-size: 2rem; font-weight: 700;"></div>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Ano ang pambansang hayop?", opt: ["Aso", "Kalabaw", "Kambing"], ans: 1 },
            { q: "Ano ang katangian ng kalabaw?", opt: ["Mabangis", "Masipag", "Tamad"], ans: 1 },
            { q: "Sino ang tinutulungan ng kalabaw?", opt: ["Maglalala", "Magsasaka", "Mangingisda"], ans: 1 },
            { q: "Saan kaya makikita ang kalabaw?", opt: ["Bayan", "Bukid", "Dagat"], ans: 1 },
            { q: "Ano ang dapat nating gayahin sa kalabaw?", opt: ["Kasipagan", "Katamaran", "Kabilisan"], ans: 0 },
            { q: "Iguhit ang pambansang hayop!", type: "draw" }
        ];

        let currentQ = 0;
        let score = 0;
        let timeLeft = 300;
        let retakeCount = 0;
        let timerInterval;

        function showStory() {
            document.getElementById('content-welcome').classList.add('hidden');
            document.getElementById('content-story').classList.remove('hidden');
        }

        function startQuiz() {
            // 1. Remove background and images
            document.getElementById('bg-farm').classList.add('hidden');
            
            // 2. Change Body to White
            document.body.classList.add('quiz-mode-bg');
            
            // 3. Change Container to Blue Border
            document.getElementById('card-container').classList.add('quiz-mode-card');

            // 4. Switch UI Content
            document.getElementById('content-story').classList.add('hidden');
            document.getElementById('content-quiz').classList.remove('hidden');
            document.getElementById('timer-display').classList.remove('hidden');
            
            startTimer();
            loadQuestion();
        }

        function resetQuiz() {
            retakeCount++;
            currentQ = 0;
            score = 0;
            
            // Restore Quiz HTML Structure
            document.getElementById('content-quiz').innerHTML = `
                <h2 id="question-text" class="blue-text" style="font-size: 2.5rem; margin-bottom: 20px;"></h2>
                <div id="choices-container"></div>
                <div id="drawing-container" class="hidden">
                    <div id="drawing-area"><img src="kalabaw.png" id="outline-img"><canvas id="trace-canvas" width="500" height="300"></canvas></div>
                    <button class="btn-custom btn-blue mt-3" onclick="submitDrawing()">IPASA ANG GAWA 📄</button>
                </div>
                <div id="message" class="mt-3" style="font-size: 2rem; font-weight: 700;"></div>
            `;
            timeLeft = 300;
            clearInterval(timerInterval);
            
            document.getElementById('content-quiz').classList.add('hidden');
            document.getElementById('content-welcome').classList.remove('hidden');
            document.getElementById('bg-farm').classList.remove('hidden');
            document.body.classList.remove('quiz-mode-bg');
            document.getElementById('card-container').classList.remove('quiz-mode-card');
            document.getElementById('timer-display').classList.add('hidden');
        }

        function loadQuestion() {
            const data = questions[currentQ];
            document.getElementById('question-text').innerHTML = `${currentQ + 1}. ${data.q}`;
            const container = document.getElementById('choices-container');
            const drawContainer = document.getElementById('drawing-container');
            
            container.innerHTML = "";
            document.getElementById('message').innerText = "";

            if (data.type === "draw") {
                container.classList.add('hidden');
                drawContainer.classList.remove('hidden');
                initCanvas();
            } else {
                container.classList.remove('hidden');
                drawContainer.classList.add('hidden');
                data.opt.forEach((val, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "btn-choice";
                    btn.innerHTML = `<span class="choice-marker">${String.fromCharCode(65+idx)}.</span> ${val}`;
                    btn.onclick = () => checkAnswer(idx, data.ans);
                    container.appendChild(btn);
                });
            }
        }

        function checkAnswer(idx, correct) {
            if(idx === correct) {
                score++;
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                document.getElementById('message').innerHTML = "<span style='color:#2ecc71'>⭐ TAMA! ⭐</span>";
            } else {
                document.body.style.background = "#ff4757";
                setTimeout(() => document.body.style.background = "#ffffff", 400);
                document.getElementById('message').innerHTML = "<span style='color:#e74c3c'>❌ Subukan Muli!</span>";
            }
            setTimeout(() => {
                currentQ++;
                if(currentQ < questions.length) loadQuestion();
                else finish();
            }, 1200);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if(timeLeft > 0) {
                    timeLeft--;
                    let m = Math.floor(timeLeft/60);
                    let s = timeLeft%60;
                    document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                } else {
                    clearInterval(timerInterval);
                }
            }, 1000);
        }

        function finish() {
            const isPerfect = (score === questions.length);
            if(isPerfect) {
                localStorage.setItem('story_completed_kalabaw', 'true');
            }

            // SAVE TO LEADERBOARD
            const currentUser = localStorage.getItem('currentUser');
            if(currentUser) {
                let leaderboard = JSON.parse(localStorage.getItem('leaderboard')) || {};
                if(!leaderboard[currentUser]) leaderboard[currentUser] = {};
                
                const currentData = leaderboard[currentUser]['kalabaw'] || { score: 0, retakes: 0 };
                let newScore = isPerfect ? score : currentData.score;
                
                leaderboard[currentUser]['kalabaw'] = { score: newScore, retakes: retakeCount };
                localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
            }

            document.getElementById('content-quiz').innerHTML = `
                <h1 class="blue-text">${isPerfect ? 'NAPAKAHUSAY!' : 'KAYA MO YAN!'}</h1>
                <div style="font-size:3rem; color:#40916c">SCORE: ${score}/${questions.length}</div>
                <div style="font-size: 2rem; color: #004a99;" class="mb-4">Bilang ng Ulit: ${retakeCount}</div>
                ${isPerfect 
                    ? `<button class="btn-custom btn-blue mt-4" onclick="window.location.href='../story DrJoseRizal/DrJosePRizal.html'">SUSUNOD NA ARALIN ➡️</button>` 
                    : `<button class="btn-custom btn-blue mt-4" onclick="resetQuiz()">ULITIN 🔄</button>`
                }
                <button class="btn-custom btn-blue mt-3" style="background-color: #e74c3c; box-shadow: 0 10px 0 #c0392b;" onclick="window.location.href='../Main.html'">HOME 🏠</button>
            `;
        }

        let canvas, ctx, drawing = false;
        function initCanvas() {
            canvas = document.getElementById('trace-canvas');
            ctx = canvas.getContext('2d');
            ctx.lineWidth = 6; ctx.lineCap = "round"; ctx.strokeStyle = "#004a99";
            canvas.onmousedown = () => drawing = true;
            canvas.onmouseup = () => { drawing = false; ctx.beginPath(); };
            canvas.onmousemove = (e) => {
                if(!drawing) return;
                const rect = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.stroke();
            };
        }

        function submitDrawing() {
            score++;
            confetti();
            finish();
        }
    </script>
</body>
</html>
