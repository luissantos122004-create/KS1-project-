<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ang Walis ni Tata Willy - Interactive Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @font-face {
            font-family: 'Alfabeto';
            src: url('Alfabeto.ttf') format('truetype');
        }
        :root {
            --primary-font: 'Alfabeto', 'Comic Sans MS', cursive, sans-serif;
            --blue-accent: #0077b6; /* Blue accent for borders */
            --broom-tan: #f3e5ab;
            --text-black: #000000;
        }

        body, html {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            font-family: var(--primary-font);
            background: linear-gradient(180deg, #fdfcf0 0%, #f3e5ab 100%);
            user-select: none;
            color: var(--text-black);
            transition: background 0.3s ease;
        }

        /* Specific style for white background during quiz */
        body.quiz-active {
            background: #ffffff !important;
        }

        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.98); 
            border: 12px solid var(--blue-accent); /* Blue accent border */
            border-radius: 50px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            max-width: 1100px; width: 95%; text-align: center; position: relative;
        }

        .story-box {
            flex: 1; font-size: 2.2rem; line-height: 1.2; background: #ffffff;
            border-radius: 30px; border: 5px dashed var(--blue-accent); padding: 25px;
            text-align: left;
        }

        .story-container { display: flex; align-items: center; justify-content: center; gap: 30px; margin-top: 10px; }
        .story-image-box { flex: 0.6; max-width: 350px; }
        .story-image-box img { width: 100%; height: auto; border-radius: 20px; }

        .deped-logo { position: absolute; top: -75px; left: 40px; width: 140px; }
        
        #timer-display {
            position: fixed; top: 20px; right: 20px; background: #d62828; color: white !important;
            padding: 10px 25px; border-radius: 50px; font-size: 2rem; font-weight: 700;
            border: 4px solid white; z-index: 100;
        }

        .btn-custom {
            font-size: 2.5rem; padding: 15px 50px; border-radius: 100px; border: none;
            font-weight: 700; color: white !important; box-shadow: 0 10px 0 #005f8d; cursor: pointer;
            text-transform: uppercase; background-color: var(--blue-accent);
        }

        .btn-choice { 
            background-color: white; border: 4px solid var(--blue-accent); 
            width: 100%; margin-bottom: 15px; text-align: left; padding: 15px 35px;
            font-size: 2rem; border-radius: 30px; box-shadow: 0 8px 0 var(--blue-accent);
            transition: all 0.2s; color: var(--text-black) !important;
        }
        
        .btn-choice:hover:not(:disabled) { background-color: #e1f5fe; }
        
        .choice-marker { color: #000000 !important; font-weight: 700; margin-right: 10px; }
        .q-number { color: #000000 !important; font-weight: 700; }

        #message { font-size: 2.5rem; margin-top: 10px; min-height: 3.5rem; font-weight: 700; }
        .hidden { display: none !important; }
        .score-text { font-size: 4.5rem; font-weight: 700; color: var(--blue-accent) !important; }

        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div id="timer-display" class="hidden">05:00</div>

    <div class="ui-wrapper">
        <div class="main-card" id="card-container">
            <img src="deped.png" class="deped-logo" alt="DepEd Logo">
            
            <div id="content-welcome">
                <h1 class="mb-5" style="font-size: 3.5rem; color: var(--blue-accent);">Ang Walis ni Tata Willy</h1>
                <button class="btn-custom" onclick="showStory()">MAGSIMULA</button>
            </div>

            <div id="content-story" class="hidden">
                <h1 class="mb-4" style="color: var(--blue-accent);">Ang Walis ni Tata Willy</h1>
                <div class="story-container">
                    <div class="story-box">
                        Gumawa ng walong walis si<br>
                        Tata Willy. Walong walis tingting<br>
                        ang kanyang ginawa.<br>
                        Ipagbibili niya ito sa talipapa.<br>
                        Sampung piso ang isa.
                    </div>
                    <div class="story-image-box">
                        <img src="walis.png" alt="Walis" onerror="this.src='https://cdn-icons-png.flaticon.com/512/911/911933.png'">
                    </div>
                </div>
                <button class="btn-custom mt-4" onclick="startQuiz()">MAGPATULOY</button>
            </div>

            <div id="content-quiz" class="hidden">
                <div class="mb-4">
                    <h2 id="question-text" style="font-size: 2.8rem; font-weight: 700;"></h2>
                </div>
                <div id="choices-container"></div>
                <div id="message"></div>
            </div>
        </div>
    </div>

    <audio id="ding" src="https://www.myinstants.com/media/sounds/ding-sound-effect_1.mp3"></audio>
    <audio id="buzzer" src="https://www.myinstants.com/media/sounds/spongebob-fail.mp3"></audio>

    <script>
        const STORY_ID = 'twalis';
        const questions = [
            { q: "Ano ang ginawa ni Tata Willy?", opt: ["Banig", "Basahan", "Upuan", "Walis Tingting"], ans: 3 },
            { q: "Ilang walis ang kaniyang ginawa?", opt: ["6", "8", "10", "12"], ans: 1 },
            { q: "Magkano niya ito ibebenta?", opt: ["₱ 10.00", "₱ 20.00", "₱ 30.00", "₱ 40.00"], ans: 0 },
            { q: "Magkano lahat ang mga walong walis?", opt: ["₱ 50.00", "₱ 60.00", "₱ 70.00", "₱ 80.00"], ans: 3 },
            { q: "Kung kalahati lang ang mabebenta, magkano lang ang pera niya?", opt: ["₱ 40.00", "₱ 50.00", "₱ 60.00", "₱ 70.00"], ans: 0 }
        ];

        let currentQ = 0;
        let score = 0;
        let timeLeft = 300;
        let retakeCount = 0;
        let timerInterval;
        let timerStarted = false;
        let quizStarted = false;
        let isSaved = false;

        async function fetchInitialRetakes() {
            const userJson = localStorage.getItem('currentUser');
            if (!userJson) return;
            const user = JSON.parse(userJson);
            try {
                const response = await fetch('../get_leaderboard.php?action=user_details&school_id=' + user.school_id);
                const result = await response.json();
                if (result.success) {
                    const record = result.records.find(r => r.story_id === STORY_ID);
                    if (record) retakeCount = parseInt(record.retakes) || 0;
                }
            } catch (e) { console.error("Error fetching retakes:", e); }
        }
        fetchInitialRetakes();

        function showStory() {
            document.getElementById('ding').play();
            document.getElementById('content-welcome').classList.add('hidden');
            document.getElementById('content-story').classList.remove('hidden');
        }

        function startQuiz() {
            quizStarted = true;
            document.getElementById('ding').play();
            document.body.classList.add('quiz-active'); // Switches to white background
            document.getElementById('content-story').classList.add('hidden');
            document.getElementById('content-quiz').classList.remove('hidden');
            document.getElementById('timer-display').classList.remove('hidden');
            if(!timerStarted) { startTimer(); timerStarted = true; }
            loadQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    let mins = Math.floor(timeLeft / 60);
                    let secs = timeLeft % 60;
                    document.getElementById('timer-display').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                } else {
                    clearInterval(timerInterval);
                    finish();
                }
            }, 1000);
        }

        function loadQuestion() {
            const data = questions[currentQ];
            document.getElementById('question-text').innerHTML = `<span class="q-number">${currentQ + 1}.</span> ${data.q}`;
            const container = document.getElementById('choices-container');
            container.innerHTML = "";
            document.getElementById('message').innerText = "";
            
            data.opt.forEach((val, idx) => {
                const btn = document.createElement('button');
                btn.className = "btn-choice";
                btn.innerHTML = `<span class="choice-marker">${String.fromCharCode(65 + idx)}.</span> ${val}`;
                
                btn.onclick = () => {
                    const allBtns = container.querySelectorAll('.btn-choice');
                    allBtns.forEach(b => b.disabled = true);

                    if(idx === data.ans) {
                        score++;
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                        document.getElementById('ding').play();
                        document.getElementById('message').innerHTML = "<span style='color:#2ecc71'>TAMA! 🌟</span>";
                    } else {
                        document.getElementById('buzzer').play();
                        btn.classList.add('shake');
                        document.getElementById('message').innerHTML = "<span style='color:#e74c3c'>SUBUKAN MULI!</span>";
                    }
                    
                    setTimeout(() => {
                        currentQ++;
                        if(currentQ < questions.length) loadQuestion();
                        else finish();
                    }, 1500);
                };
                container.appendChild(btn);
            });
        }

        async function finish() {
            clearInterval(timerInterval);
            document.getElementById('timer-display').classList.add('hidden');

            const quizNode = document.getElementById('content-quiz');
            const isPerfect = (score === questions.length);
            if (!isPerfect) retakeCount++;

            const userJson = localStorage.getItem('currentUser');
            if (userJson) {
                const user = JSON.parse(userJson);
                await fetch('../save_progress.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        school_id: user.school_id,
                        story_id: STORY_ID,
                        is_perfect: isPerfect
                    })
                }).catch(e => console.error("Error saving result:", e));
                isSaved = true;
            }

            if (isPerfect) {
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
                setTimeout(() => {
                    window.location.href = '../Main.html?completed=' + encodeURIComponent(STORY_ID);
                }, 2500);
            }

            quizNode.innerHTML = `
                <h1 class="mb-4">${isPerfect ? '🏆 NAPAKAHUSAY! 🏆' : 'KAYA MO YAN!'}</h1>
                <div class="score-text mb-4">SCORE: ${score}/${questions.length}</div>
                <div style="font-size: 2rem; color: var(--blue-accent);" class="mb-4">Bilang ng Ulit: ${retakeCount}</div>
                <p style="font-size: 1.8rem;">
                    ${isPerfect 
                        ? 'Magaling! Inaayos na ang susunod na kuwento...' 
                        : 'Subukan muli para makuha ang perpektong score.'}
                </p>
                <div class="d-flex flex-column gap-2 align-items-center">
                    ${isPerfect 
                        ? `<p class="fs-4">Naglo-load ng susunod na aralin...</p>` 
                        : `<button class="btn-custom mt-2" onclick="resetQuiz()">ULITIN 🔄</button>`}
                    <button class="btn-custom mt-2" style="background-color: #6c757d; box-shadow: 0 10px 0 #495057;" onclick="goHome()">HOME 🏠</button>
                </div>
            `;
        }

        function resetQuiz() {
            currentQ = 0;
            score = 0;
            isSaved = false;
            quizStarted = false;
            timeLeft = 300;
            clearInterval(timerInterval);
            timerStarted = false;

            document.getElementById('content-quiz').innerHTML = `
                <div class="mb-4"><h2 id="question-text" style="font-size: 2.8rem; font-weight: 700;"></h2></div>
                <div id="choices-container"></div><div id="message"></div>
            `;
            
            document.getElementById('content-quiz').classList.add('hidden');
            document.getElementById('content-welcome').classList.remove('hidden');
            document.body.classList.remove('quiz-active');
            document.getElementById('timer-display').classList.add('hidden');
            fetchInitialRetakes();
        }

        function goHome() {
            const leave = () => { window.location.href = '../Main.html'; };
            if (quizStarted && !isSaved) {
                if (confirm("Hindi pa tapos ang quiz. Kung aalis ka, hindi ito mase-save. Sigurado ka ba?")) {
                    leave();
                }
            } else {
                leave();
            }
        }

        window.onbeforeunload = function() {
            if (quizStarted && !isSaved) {
                return "Hindi pa tapos ang quiz. Kung aalis ka, hindi ito mase-save. Sigurado ka ba?";
            }
        }
    </script>
</body>
</html>
